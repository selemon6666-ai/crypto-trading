<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            width: 450px;
        }
        h1 { color: white; margin-bottom: 20px; text-align: center; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }
        .error { color: #ff6666; margin-top: 10px; display: none; text-align: center; }
        .success { color: #00ff88; margin-top: 10px; display: none; text-align: center; }
        a { color: #00d4ff; text-decoration: none; }
        p { text-align: center; margin-top: 20px; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Create Account</h1>
    <input type="text" id="fullName" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">
    <button onclick="register()">Sign Up</button>
    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>
    <p>Already have an account? <a href="index.html">Login</a></p>
</div>

<script type="module">
    import { auth, createUserWithEmailAndPassword, db, doc, setDoc } from './firebase-config.js';
    
    window.register = async function() {
        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        
        if (!fullName || !email || !password) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = '❌ Please fill in all fields';
            return;
        }
        
        if (password !== confirmPassword) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = '❌ Passwords do not match';
            return;
        }
        
        if (password.length < 6) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = '❌ Password must be at least 6 characters';
            return;
        }
        
        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            
            await setDoc(doc(db, 'users', user.uid), {
                fullName: fullName,
                email: email,
                balance: 10000,
                kycStatus: 'pending',
                tradeHistory: [],
                registeredAt: new Date().toISOString()
            });
            
            successMsg.style.display = 'block';
            successMsg.innerText = '✅ Account created! Redirecting to login...';
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        } catch (error) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = '❌ ' + error.message;
        }
    }
</script>
</body>
</html>
