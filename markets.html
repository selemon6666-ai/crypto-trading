<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Markets</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #131722;
            color: #d1d4dc;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 40px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #d1d4dc;
            text-decoration: none;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .nav-links a:hover {
            color: #00d4ff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .username {
            color: #00d4ff;
        }

        .theme-toggle {
            background: rgba(0, 212, 255, 0.15);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .logout-btn {
            background: rgba(255, 68, 68, 0.15);
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid rgba(255, 68, 68, 0.3);
            cursor: pointer;
            color: #ff4444;
            font-size: 0.85rem;
        }

        .main-content {
            margin-top: 70px;
            padding: 20px 30px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .page-header {
            margin-bottom: 25px;
        }

        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: white;
        }

        .page-header p {
            color: #787b86;
            margin-top: 5px;
        }

        .search-section {
            margin-bottom: 25px;
        }

        .search-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            background: #2a2e39;
            border: 1px solid #3a3e49;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
        }

        .category-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: #2a2e39;
            border: 1px solid #3a3e49;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            color: #d1d4dc;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-color: transparent;
            color: white;
        }

        .market-table {
            background: #1e222d;
            border-radius: 12px;
            border: 1px solid #2a2e39;
            overflow: hidden;
        }

        .table-header {
            display: grid;
            grid-template-columns: 2fr 1.2fr 1.5fr 1.2fr 1fr;
            padding: 15px 20px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
            font-weight: 600;
            color: #787b86;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .market-row {
            display: grid;
            grid-template-columns: 2fr 1.2fr 1.5fr 1.2fr 1fr;
            padding: 15px 20px;
            border-bottom: 1px solid #2a2e39;
            transition: background 0.3s;
            cursor: pointer;
        }

        .market-row:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        .coin-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .coin-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .coin-name {
            font-weight: 600;
            color: white;
        }

        .coin-symbol {
            font-size: 0.7rem;
            color: #787b86;
        }

        .coin-price {
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
        }

        .market-cap {
            color: #d1d4dc;
            font-size: 0.85rem;
        }

        .change-positive {
            color: #00ff88;
            font-weight: 600;
        }

        .change-negative {
            color: #ff4444;
            font-weight: 600;
        }

        .details-btn {
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            color: #00d4ff;
            font-size: 0.8rem;
            transition: 0.3s;
            width: fit-content;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #1e222d;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #2a2e39;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #787b86;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #00d4ff;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 12px 20px;
                flex-direction: column;
                gap: 12px;
            }
            .nav-links {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .main-content {
                padding: 15px;
                margin-top: 100px;
            }
            .table-header {
                display: none;
            }
            .market-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .stats-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">📈 Luno Trading</div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="markets.html" style="color: #00d4ff;">Markets</a>
        <a href="trade.html">Trades</a>
        <a href="profile.html">My Profile</a>
    </div>
    <div class="user-info">
        <span class="username" id="displayUsername">Trader</span>
        <div class="theme-toggle" onclick="toggleTheme()">🌓 Theme</div>
        <a href="#" class="logout-btn" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="main-content">
    <div class="page-header">
        <h1>Cryptocurrency Prices</h1>
        <p>Live real-time prices from CoinGecko API</p>
    </div>

    <div class="stats-cards">
        <div class="stat-card">
            <div class="stat-label">Total Market Cap</div>
            <div class="stat-value" id="totalMarketCap">$2.45T</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">24h Volume</div>
            <div class="stat-value" id="totalVolume">$68.5B</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">BTC Dominance</div>
            <div class="stat-value" id="btcDominance">48.7%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Active Coins</div>
            <div class="stat-value" id="activeCoins">15</div>
        </div>
    </div>

    <div class="category-filters">
        <button class="filter-btn active" data-category="all">All Coins</button>
        <button class="filter-btn" data-category="large">Large Cap</button>
        <button class="filter-btn" data-category="mid">Mid Cap</button>
        <button class="filter-btn" data-category="defi">DeFi</button>
        <button class="filter-btn" data-category="meme">Meme Coins</button>
    </div>

    <div class="search-section">
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search cryptocurrency... (BTC, ETH, DOGE, etc.)">
        </div>
    </div>

    <div class="market-table">
        <div class="table-header">
            <div>Coin</div>
            <div>Price</div>
            <div>24h Change</div>
            <div>Market Cap</div>
            <div>Action</div>
        </div>
        <div id="marketList">
            <div class="loading">Loading market data...</div>
        </div>
    </div>
</div>

<script>
    // Cryptocurrency data with fallback
    const cryptoData = [
        { symbol: 'BTC', name: 'Bitcoin', price: 65234.50, change24h: 2.34, marketCap: 1280000000000, category: 'large' },
        { symbol: 'ETH', name: 'Ethereum', price: 3420.75, change24h: 1.56, marketCap: 410000000000, category: 'large' },
        { symbol: 'BNB', name: 'Binance Coin', price: 580.20, change24h: 0.89, marketCap: 89000000000, category: 'large' },
        { symbol: 'SOL', name: 'Solana', price: 145.30, change24h: 3.21, marketCap: 64000000000, category: 'large' },
        { symbol: 'XRP', name: 'XRP', price: 0.62, change24h: -0.45, marketCap: 34000000000, category: 'large' },
        { symbol: 'ADA', name: 'Cardano', price: 0.48, change24h: 1.23, marketCap: 17000000000, category: 'large' },
        { symbol: 'DOGE', name: 'Dogecoin', price: 0.124, change24h: 5.67, marketCap: 18000000000, category: 'meme' },
        { symbol: 'DOT', name: 'Polkadot', price: 7.25, change24h: -1.23, marketCap: 9500000000, category: 'mid' },
        { symbol: 'LINK', name: 'Chainlink', price: 15.40, change24h: 2.80, marketCap: 9000000000, category: 'mid' },
        { symbol: 'MATIC', name: 'Polygon', price: 0.72, change24h: 0.45, marketCap: 6800000000, category: 'mid' },
        { symbol: 'SHIB', name: 'Shiba Inu', price: 0.000018, change24h: 4.20, marketCap: 10600000000, category: 'meme' },
        { symbol: 'UNI', name: 'Uniswap', price: 8.15, change24h: -0.80, marketCap: 6200000000, category: 'defi' }
    ];

    let cryptocurrencies = [...cryptoData];
    let currentCategory = 'all';
    let currentSearch = '';

    function formatMarketCap(cap) {
        if (cap >= 1e12) return `$${(cap / 1e12).toFixed(2)}T`;
        if (cap >= 1e9) return `$${(cap / 1e9).toFixed(2)}B`;
        if (cap >= 1e6) return `$${(cap / 1e6).toFixed(2)}M`;
        return `$${cap.toFixed(2)}`;
    }

    function formatPrice(price) {
        if (price < 0.01) return `$${price.toFixed(6)}`;
        if (price < 1) return `$${price.toFixed(4)}`;
        if (price < 10) return `$${price.toFixed(2)}`;
        return `$${price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
    }

    function getCoinIcon(symbol) {
        return symbol.charAt(0);
    }

    function renderMarketList() {
        const marketList = document.getElementById('marketList');
        let filteredCoins = cryptocurrencies;
        
        if (currentCategory !== 'all') {
            filteredCoins = filteredCoins.filter(coin => coin.category === currentCategory);
        }
        
        if (currentSearch) {
            filteredCoins = filteredCoins.filter(coin => 
                coin.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                coin.symbol.toLowerCase().includes(currentSearch.toLowerCase())
            );
        }

        if (filteredCoins.length === 0) {
            marketList.innerHTML = '<div class="no-results" style="text-align:center;padding:40px;">No cryptocurrencies found.</div>';
            return;
        }

        marketList.innerHTML = filteredCoins.map(coin => {
            const changeClass = coin.change24h >= 0 ? 'change-positive' : 'change-negative';
            const changeSymbol = coin.change24h >= 0 ? '+' : '';
            return `
            <div class="market-row" onclick="goToTradingView('${coin.symbol}')">
                <div class="coin-info">
                    <div class="coin-icon">${getCoinIcon(coin.symbol)}</div>
                    <div>
                        <div class="coin-name">${coin.name}</div>
                        <div class="coin-symbol">${coin.symbol}</div>
                    </div>
                </div>
                <div class="coin-price">${formatPrice(coin.price)}</div>
                <div class="${changeClass}">${changeSymbol}${coin.change24h}%</div>
                <div class="market-cap">${formatMarketCap(coin.marketCap)}</div>
                <div>
                    <button class="details-btn" onclick="event.stopPropagation(); goToTradingView('${coin.symbol}')">📊 Trading View</button>
                </div>
            </div>
        `}).join('');
    }

    function goToTradingView(symbol) {
        localStorage.setItem('selectedCrypto', JSON.stringify({ symbol: symbol }));
        window.location.href = `trading-view.html?symbol=${symbol}`;
    }

    async function updateStats() {
        document.getElementById('activeCoins').innerText = cryptocurrencies.length;
    }

    function checkAuth() {
        const savedUser = localStorage.getItem('lunoUser') || sessionStorage.getItem('lunoUser');
        if (!savedUser) window.location.href = 'index.html';
        return savedUser ? JSON.parse(savedUser) : null;
    }

    function displayUsername() {
        const user = checkAuth();
        if (user && user.fullName) {
            document.getElementById('displayUsername').innerText = user.fullName.split(' ')[0];
        } else if (user && user.email) {
            document.getElementById('displayUsername').innerText = user.email.split('@')[0];
        }
    }

    async function logout() {
        await supabaseClient.signOut();
        localStorage.removeItem('lunoUser');
        sessionStorage.removeItem('lunoUser');
        window.location.href = 'index.html';
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }

    function checkTheme() {
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.getAttribute('data-category');
            renderMarketList();
        });
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        renderMarketList();
    });

    displayUsername();
    renderMarketList();
    updateStats();
    checkTheme();
</script>

</body>
</html>
