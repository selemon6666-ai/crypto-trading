<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #131722;
            color: #d1d4dc;
            transition: background 0.3s, color 0.3s;
        }

        /* Light Mode */
        body.light-mode {
            background: #ffffff;
            color: #1e222d;
        }

        body.light-mode .navbar {
            background: #ffffff;
            border-bottom-color: #e0e0e0;
        }

        body.light-mode .nav-links a {
            color: #1e222d;
        }

        body.light-mode .stat-card {
            background: #ffffff;
            border-color: #e0e0e0;
        }

        body.light-mode .badge {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
        }

        body.light-mode .start-btn {
            color: white;
        }

        /* Canvas Background */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        body.light-mode #canvas-bg {
            opacity: 0.05;
        }

        /* Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 40px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #d1d4dc;
            text-decoration: none;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .nav-links a:hover {
            color: #00d4ff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .username {
            color: #00d4ff;
        }

        .theme-toggle {
            background: rgba(0, 212, 255, 0.15);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            border: 1px solid rgba(0, 212, 255, 0.3);
            transition: 0.3s;
        }

        .theme-toggle:hover {
            background: rgba(0, 212, 255, 0.3);
        }

        .logout-btn {
            background: rgba(255, 68, 68, 0.15);
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid rgba(255, 68, 68, 0.3);
            cursor: pointer;
            color: #ff4444;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.3);
        }

        /* Main Content */
        .main-content {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 20px 60px;
        }

        .badge {
            background: rgba(0, 212, 255, 0.1);
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            line-height: 1.2;
            color: white;
        }

        body.light-mode h1 {
            color: #1e222d;
        }

        .gradient-text {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #787b86;
            margin-bottom: 40px;
            max-width: 600px;
        }

        .start-btn {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            padding: 12px 40px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.3);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            margin-top: 60px;
        }

        .stat-card {
            background: #1e222d;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2e39;
            text-align: center;
            transition: background 0.3s, border 0.3s;
        }

        .stat-card .stat-label {
            font-size: 0.75rem;
            color: #787b86;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .stat-card .stat-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #00ff88;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 12px 20px;
                flex-direction: column;
                gap: 12px;
            }
            .nav-links {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .user-info {
                flex-wrap: wrap;
                justify-content: center;
            }
            h1 {
                font-size: 2rem;
            }
            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<nav class="navbar">
    <div class="logo">📈 Luno Trading</div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="markets.html">Markets</a>
        <a href="trade.html">Trades</a>
        <a href="profile.html">My Profile</a>
    </div>
    <div class="user-info">
        <span class="username" id="displayUsername">Trader</span>
        <div class="theme-toggle" onclick="toggleTheme()">🌓 Theme</div>
        <a href="#" class="logout-btn" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="main-content">
    <div class="badge">⚡ Welcome to Luno Trading</div>
    <h1>
        Trade <span class="gradient-text">Smarter,</span><br>
        Trade Better
    </h1>
    <p class="subtitle">
        Empower your trading journey with real-time insights and expert analysis.
    </p>
    <button class="start-btn" onclick="goToTrade()">🚀 Start Trading</button>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-label">Your Balance</div>
            <div class="stat-value" id="balance">$0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Trades</div>
            <div class="stat-value" id="totalTrades">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Win Rate</div>
            <div class="stat-value" id="winRate">0%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Profit Today</div>
            <div class="stat-value" id="profitToday">+$0</div>
        </div>
    </div>
</div>

<script>
    // Canvas Animation
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    
    function drawGrid() {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
        ctx.lineWidth = 1;
        const step = 50;
        for (let x = 0; x < canvas.width; x += step) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += step) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }
    }
    
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, '#131722');
        gradient.addColorStop(1, '#1e222d');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawGrid();
        requestAnimationFrame(animate);
    }
    
    resizeCanvas();
    animate();
    window.addEventListener('resize', resizeCanvas);
    
    // FIXED LOGOUT FUNCTION
    async function logout() {
        console.log('Logging out...');
        try {
            // Sign out from Supabase
            const { error } = await supabase.auth.signOut();
            if (error) {
                console.error('Supabase sign out error:', error);
            }
        } catch (e) {
            console.error('Logout error:', e);
        }
        
        // Clear local storage
        localStorage.removeItem('lunoUser');
        sessionStorage.removeItem('lunoUser');
        
        // Redirect to login page
        window.location.href = 'index.html';
    }
    
    // Theme Toggle
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        
        // Update canvas colors for theme
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        if (isLight) {
            gradient.addColorStop(0, '#f5f5f5');
            gradient.addColorStop(1, '#ffffff');
        } else {
            gradient.addColorStop(0, '#131722');
            gradient.addColorStop(1, '#1e222d');
        }
    }
    
    function checkTheme() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
        }
    }
    
    // Dashboard Functions
    async function checkAuth() {
        try {
            const { data: { user }, error } = await supabase.auth.getUser();
            if (error || !user) {
                console.log('No user found, redirecting to login');
                window.location.href = 'index.html';
                return null;
            }
            return user;
        } catch (e) {
            console.error('Auth check error:', e);
            window.location.href = 'index.html';
            return null;
        }
    }
    
    async function displayUsername() {
        const user = await checkAuth();
        if (!user) return;
        
        try {
            const { data: profile, error } = await supabase
                .from('users')
                .select('full_name')
                .eq('id', user.id)
                .single();
            
            if (profile && profile.full_name) {
                document.getElementById('displayUsername').innerText = profile.full_name.split(' ')[0];
            } else {
                document.getElementById('displayUsername').innerText = user.email.split('@')[0];
            }
        } catch (e) {
            document.getElementById('displayUsername').innerText = user.email.split('@')[0];
        }
    }
    
    async function updateStats() {
        const user = await checkAuth();
        if (!user) return;
        
        try {
            // Get user balance
            const { data: profile, error: profileError } = await supabase
                .from('users')
                .select('balance')
                .eq('id', user.id)
                .single();
            
            if (profile) {
                document.getElementById('balance').innerText = `$${(profile.balance || 0).toLocaleString()}`;
            }
            
            // Get trade statistics
            const { data: trades, error: tradesError } = await supabase
                .from('trades')
                .select('*')
                .eq('user_id', user.id);
            
            if (!tradesError && trades) {
                const totalTrades = trades.length;
                const wonTrades = trades.filter(t => t.status === 'won').length;
                const winRate = totalTrades > 0 ? (wonTrades / totalTrades * 100).toFixed(1) : 0;
                
                document.getElementById('totalTrades').innerText = totalTrades;
                document.getElementById('winRate').innerText = winRate + '%';
            }
            
            // Simulated profit today (for demo)
            const todayProfit = (Math.random() * 500 - 100).toFixed(2);
            const profitElem = document.getElementById('profitToday');
            if (todayProfit >= 0) {
                profitElem.innerHTML = `+$${todayProfit}`;
                profitElem.style.color = '#00ff88';
            } else {
                profitElem.innerHTML = `-$${Math.abs(todayProfit)}`;
                profitElem.style.color = '#ff4444';
            }
            
        } catch (error) {
            console.error('Error updating stats:', error);
        }
    }
    
    function goToTrade() { 
        window.location.href = 'trade.html'; 
    }
    
    // Initialize dashboard
    async function init() {
        await checkAuth();
        await displayUsername();
        await updateStats();
        checkTheme();
    }
    
    // Refresh stats every 30 seconds
    setInterval(async () => {
        await updateStats();
    }, 30000);
    
    init();
</script>

</body>
</html>
