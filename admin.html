<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Admin - All Users</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo { font-size: 1.5rem; font-weight: bold; background: linear-gradient(135deg, #00d4ff, #7c3aed); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .container { padding: 100px 40px 40px; }
        h1 { margin-bottom: 20px; }
        .info-banner { background: rgba(0,255,136,0.1); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(0,255,136,0.3); }
        table { width: 100%; background: rgba(255, 255, 255, 0.05); border-radius: 16px; overflow: hidden; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        th { background: rgba(0, 0, 0, 0.3); color: #00d4ff; }
        .btn-approve { background: rgba(0, 255, 136, 0.2); border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; color: #00ff88; margin-right: 5px; }
        .btn-reject { background: rgba(255, 68, 68, 0.2); border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; color: #ff4444; }
        .status-verified { color: #00ff88; }
        .status-pending { color: #ffaa00; }
        .logout-btn { background: rgba(255, 255, 255, 0.1); padding: 8px 20px; border-radius: 25px; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.2); }
        .refresh-btn { background: rgba(0, 212, 255, 0.2); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; color: #00d4ff; margin-bottom: 20px; }
        .loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo">👑 Luno Admin</div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <span id="adminName">Admin</span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</nav>
<div class="container">
    <h1>👥 All Users (Across All Devices)</h1>
    <div class="info-banner">
        ✅ <strong>Connected to Firebase</strong> - You can see users from ANY device!
    </div>
    <button class="refresh-btn" onclick="loadAllUsers()">🔄 Refresh Users</button>
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr><th>Email</th><th>Full Name</th><th>Balance</th><th>KYC Status</th><th>Registered</th><th>Actions</th></tr>
            </thead>
            <tbody id="usersList">
                <tr><td colspan="6" class="loading">Loading users...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { auth, db, collection, getDocs, doc, updateDoc, signOut } from './firebase-config.js';
    
    const userId = sessionStorage.getItem('userId');
    const userEmail = sessionStorage.getItem('userEmail');
    
    if (!userId) {
        window.location.href = 'index.html';
    }
    
    document.getElementById('adminName').innerText = userEmail;
    
    window.loadAllUsers = async function() {
        const usersList = document.getElementById('usersList');
        usersList.innerHTML = '<tr><td colspan="6" class="loading">Loading users...</td></tr>';
        
        try {
            const querySnapshot = await getDocs(collection(db, 'users'));
            const users = [];
            querySnapshot.forEach((doc) => {
                users.push({ id: doc.id, ...doc.data() });
            });
            
            if (users.length === 0) {
                usersList.innerHTML = '<tr><td colspan="6" class="loading">No users found</td></tr>';
                return;
            }
            
            usersList.innerHTML = users.map(user => `
                <tr>
                    <td>${user.email}</td>
                    <td>${user.fullName}</td>
                    <td>$${user.balance?.toFixed(2) || '10000'}</td>
                    <td class="status-${user.kycStatus || 'pending'}">${user.kycStatus || 'pending'}</td>
                    <td>${new Date(user.registeredAt).toLocaleDateString()}</td>
                    <td>
                        <button class="btn-approve" onclick="updateBalance('${user.id}', ${user.balance || 10000})">Edit Balance</button>
                        <button class="btn-approve" onclick="approveKYC('${user.id}')">Approve KYC</button>
                    </td>
                </tr>
            `).join('');
        } catch (error) {
            console.error('Error:', error);
            usersList.innerHTML = '<tr><td colspan="6" class="loading">Error loading users. Make sure Firebase is configured.</td></tr>';
        }
    }
    
    window.updateBalance = async function(userId, currentBalance) {
        const newBalance = prompt('Enter new balance:', currentBalance);
        if (newBalance && !isNaN(newBalance)) {
            await updateDoc(doc(db, 'users', userId), { balance: parseFloat(newBalance) });
            alert('✅ Balance updated!');
            loadAllUsers();
        }
    }
    
    window.approveKYC = async function(userId) {
        await updateDoc(doc(db, 'users', userId), { kycStatus: 'verified' });
        alert('✅ KYC approved!');
        loadAllUsers();
    }
    
    window.logout = async function() {
        await signOut(auth);
        sessionStorage.clear();
        window.location.href = 'index.html';
    }
    
    loadAllUsers();
</script>
</body>
</html>
