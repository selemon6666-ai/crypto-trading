<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Admin - Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #131722;
            color: #d1d4dc;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        h1 { color: white; margin: 0; }
        
        .theme-toggle {
            background: rgba(0, 212, 255, 0.15);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        
        .logout-admin {
            background: rgba(255, 68, 68, 0.15);
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #1e222d;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a2e39;
        }
        
        .stat-number { font-size: 2rem; font-weight: bold; color: #00d4ff; }
        .stat-label { font-size: 0.8rem; color: #787b86; margin-top: 5px; }
        
        .section {
            background: #1e222d;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2a2e39;
        }
        
        .section-title { font-size: 1.2rem; margin-bottom: 15px; color: white; font-weight: 600; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #2a2e39; }
        th { color: #787b86; font-weight: 600; font-size: 0.8rem; }
        
        button {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: #00d4ff;
            margin-right: 5px;
            transition: 0.2s;
        }
        
        .btn-win { background: rgba(0, 255, 136, 0.2); color: #00ff88; border-color: rgba(0, 255, 136, 0.3); }
        .btn-lose { background: rgba(255, 68, 68, 0.2); color: #ff4444; border-color: rgba(255, 68, 68, 0.3); }
        
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: #1e222d;
            padding: 35px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #2a2e39;
        }
        
        .login-box h2 { margin-bottom: 20px; color: white; }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a2e39;
            border: 1px solid #3a3e49;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .admin-content { display: none; }
        .no-data { text-align: center; padding: 30px; color: #787b86; }
        
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="loginSection" class="login-box">
        <h2>🔐 Admin Login</h2>
        <input type="email" id="adminEmail" placeholder="Admin Email" value="admin@luno.com">
        <input type="password" id="adminPassword" placeholder="Password" value="admin123">
        <button onclick="adminLogin()">Login</button>
    </div>

    <div id="adminSection" class="admin-content">
        <div class="admin-header">
            <h1>👑 Luno Admin Panel (Supabase)</h1>
            <div class="theme-toggle" onclick="toggleTheme()">🌓 Theme</div>
            <div class="logout-admin" onclick="adminLogout()">🚪 Logout</div>
        </div>
        
        <div class="stats">
            <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div class="stat-label">Total Users</div></div>
            <div class="stat-card"><div class="stat-number" id="pendingTrades">0</div><div class="stat-label">Pending Trades</div></div>
            <div class="stat-card"><div class="stat-number" id="pendingKYC">0</div><div class="stat-label">Pending KYC</div></div>
            <div class="stat-card"><div class="stat-number" id="pendingDeposits">0</div><div class="stat-label">Pending Deposits</div></div>
        </div>
        
        <div class="section">
            <div class="section-title">💰 Pending Trades</div>
            <div id="pendingTradesList">Loading...</div>
        </div>
        
        <div class="section">
            <div class="section-title">✅ Pending KYC Requests</div>
            <div id="kycList">Loading...</div>
        </div>
        
        <div class="section">
            <div class="section-title">💰 Pending Deposits</div>
            <div id="depositsList">Loading...</div>
        </div>
        
        <div class="section">
            <div class="section-title">💸 Pending Withdrawals</div>
            <div id="withdrawalsList">Loading...</div>
        </div>
        
        <div class="section">
            <div class="section-title">👥 All Users</div>
            <div id="usersList">Loading...</div>
        </div>
    </div>
</div>

<script>
    let refreshInterval = null;

    // FIXED: Direct Supabase login without using supabaseClient.signIn
    async function adminLogin() {
        const email = document.getElementById('adminEmail').value;
        const password = document.getElementById('adminPassword').value;
        
        try {
            console.log('Admin login attempt:', email);
            
            // Use Supabase directly - NOT supabaseClient
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) throw error;
            
            if (data && data.user) {
                console.log('Admin login successful:', data.user.email);
                
                // Check if user is admin (you can add admin check here)
                // For now, any logged-in user can access admin panel
                
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminSection').style.display = 'block';
                loadAllData();
                
                // Auto-refresh every 5 seconds
                if (refreshInterval) clearInterval(refreshInterval);
                refreshInterval = setInterval(loadAllData, 5000);
            }
        } catch (error) {
            console.error('Login error:', error);
            alert('Login failed: ' + error.message);
        }
    }
    
    async function adminLogout() {
        if (refreshInterval) clearInterval(refreshInterval);
        await supabase.auth.signOut();
        location.reload();
    }
    
    async function loadAllData() {
        await loadPendingTrades();
        await loadPendingKYC();
        await loadPendingDeposits();
        await loadPendingWithdrawals();
        await loadAllUsers();
        await loadStats();
    }
    
    async function loadPendingTrades() {
        try {
            const { data: trades, error } = await supabase
                .from('trades')
                .select('*, users(email, full_name)')
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            
            const pending = trades?.filter(t => t.status === 'pending') || [];
            const container = document.getElementById('pendingTradesList');
            
            if (pending.length === 0) {
                container.innerHTML = '<div class="no-data">No pending trades</div>';
                return;
            }
            
            let html = '<td><thead><tr><th>User</th><th>Coin</th><th>Amount</th><th>Duration</th><th>Expected Return</th><th>Action</th></tr></thead><tbody>';
            pending.forEach(trade => {
                html += `<tr>
                    <td>${trade.users?.email || 'N/A'}</td>
                    <td>${trade.coin_name} (${trade.coin})</td>
                    <td>$${trade.amount}</td>
                    <td>${trade.duration}s</td>
                    <td>+${trade.rate}% ($${trade.expected_profit})</td>
                    <td>
                        <button class="btn-win" onclick="setTradeOutcome('${trade.id}', 'win')">🏆 WIN</button>
                        <button class="btn-lose" onclick="setTradeOutcome('${trade.id}', 'lose')">💀 LOSE</button>
                    </td>
                </tr>`;
            });
            html += '</tbody></tr>';
            container.innerHTML = html;
        } catch(e) { console.error(e); }
    }
    
    async function setTradeOutcome(tradeId, outcome) {
        try {
            // Get trade details
            const { data: trade, error: tradeError } = await supabase
                .from('trades')
                .select('*')
                .eq('id', tradeId)
                .single();
            
            if (tradeError) throw tradeError;
            
            if (outcome === 'win') {
                const profit = trade.expected_profit;
                const totalReturn = trade.amount + profit;
                
                // Update trade status
                await supabase
                    .from('trades')
                    .update({ status: 'won', profit: profit, completed_at: new Date() })
                    .eq('id', tradeId);
                
                // Update user balance
                const { data: user } = await supabase
                    .from('users')
                    .select('balance')
                    .eq('id', trade.user_id)
                    .single();
                
                await supabase
                    .from('users')
                    .update({ balance: (user.balance || 0) + totalReturn })
                    .eq('id', trade.user_id);
                    
                alert(`✅ Trade WON! User earned $${profit.toFixed(2)} profit.`);
            } else {
                await supabase
                    .from('trades')
                    .update({ status: 'lost', profit: -trade.amount, completed_at: new Date() })
                    .eq('id', tradeId);
                    
                alert(`❌ Trade LOST! User lost $${trade.amount.toFixed(2)}.`);
            }
            
            loadPendingTrades();
            loadStats();
        } catch(e) { console.error(e); alert('Error: ' + e.message); }
    }
    
    async function loadPendingKYC() {
        try {
            const { data: kycRequests, error } = await supabase
                .from('kyc_requests')
                .select('*, users(email, full_name)')
                .eq('status', 'pending');
            
            if (error) throw error;
            
            const container = document.getElementById('kycList');
            
            if (!kycRequests || kycRequests.length === 0) {
                container.innerHTML = '<div class="no-data">No pending KYC requests</div>';
                return;
            }
            
            let html = '<td><thead><tr><th>User</th><th>Full Name</th><th>ID Type</th><th>ID Number</th><th>Action</th></tr></thead><tbody>';
            kycRequests.forEach(req => {
                html += `<tr>
                    <td>${req.users?.email || 'N/A'}</td>
                    <td>${req.full_name}</td>
                    <td>${req.id_type}</td>
                    <td>${req.id_number}</td>
                    <td><button onclick="approveKYC('${req.id}', '${req.user_id}')">✅ Approve KYC</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        } catch(e) { console.error(e); }
    }
    
    async function approveKYC(requestId, userId) {
        try {
            await supabase
                .from('kyc_requests')
                .update({ status: 'approved', reviewed_at: new Date() })
                .eq('id', requestId);
            
            await supabase
                .from('users')
                .update({ kyc_status: 'verified' })
                .eq('id', userId);
            
            alert('✅ KYC approved!');
            loadPendingKYC();
            loadStats();
        } catch(e) { console.error(e); }
    }
    
    async function loadPendingDeposits() {
        try {
            const { data: deposits, error } = await supabase
                .from('deposits')
                .select('*, users(email, full_name)')
                .eq('status', 'pending');
            
            if (error) throw error;
            
            const container = document.getElementById('depositsList');
            
            if (!deposits || deposits.length === 0) {
                container.innerHTML = '<div class="no-data">No pending deposits</div>';
                return;
            }
            
            let html = '<tr><thead><tr><th>User</th><th>Amount</th><th>Currency</th><th>Date</th><th>Action</th></tr></thead><tbody>';
            deposits.forEach(dep => {
                html += `<tr>
                    <td>${dep.users?.email || 'N/A'}</td>
                    <td>$${dep.amount}</td>
                    <td>${dep.currency}</td>
                    <td>${new Date(dep.created_at).toLocaleString()}</td>
                    <td><button onclick="approveDeposit('${dep.id}', '${dep.user_id}', ${dep.amount})">💰 Approve Deposit</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        } catch(e) { console.error(e); }
    }
    
    async function approveDeposit(depositId, userId, amount) {
        try {
            await supabase
                .from('deposits')
                .update({ status: 'approved', approved_at: new Date() })
                .eq('id', depositId);
            
            const { data: user } = await supabase
                .from('users')
                .select('balance')
                .eq('id', userId)
                .single();
            
            await supabase
                .from('users')
                .update({ balance: (user.balance || 0) + amount })
                .eq('id', userId);
            
            alert(`✅ Deposit of $${amount} approved!`);
            loadPendingDeposits();
            loadStats();
        } catch(e) { console.error(e); }
    }
    
    async function loadPendingWithdrawals() {
        try {
            const { data: withdrawals, error } = await supabase
                .from('withdrawals')
                .select('*, users(email, full_name, balance)')
                .eq('status', 'pending');
            
            if (error) throw error;
            
            const container = document.getElementById('withdrawalsList');
            
            if (!withdrawals || withdrawals.length === 0) {
                container.innerHTML = '<div class="no-data">No pending withdrawals</div>';
                return;
            }
            
            let html = '<table><thead><tr><th>User</th><th>Amount</th><th>Address</th><th>Date</th><th>Action</th></tr></thead><tbody>';
            withdrawals.forEach(wd => {
                html += `<tr>
                    <td>${wd.users?.email || 'N/A'}</td>
                    <td>$${wd.amount}</td>
                    <td>${wd.address.substring(0, 20)}...</td>
                    <td>${new Date(wd.created_at).toLocaleString()}</td>
                    <td><button onclick="approveWithdrawal('${wd.id}', '${wd.user_id}', ${wd.amount})">💸 Approve Withdrawal</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        } catch(e) { console.error(e); }
    }
    
    async function approveWithdrawal(withdrawalId, userId, amount) {
        try {
            const { data: user } = await supabase
                .from('users')
                .select('balance')
                .eq('id', userId)
                .single();
            
            if ((user.balance || 0) < amount) {
                alert('❌ Insufficient balance!');
                return;
            }
            
            await supabase
                .from('withdrawals')
                .update({ status: 'approved', approved_at: new Date() })
                .eq('id', withdrawalId);
            
            await supabase
                .from('users')
                .update({ balance: (user.balance || 0) - amount })
                .eq('id', userId);
            
            alert(`✅ Withdrawal of $${amount} approved!`);
            loadPendingWithdrawals();
            loadStats();
        } catch(e) { console.error(e); }
    }
    
    async function loadAllUsers() {
        try {
            const { data: users, error } = await supabase
                .from('users')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            
            const container = document.getElementById('usersList');
            
            if (!users || users.length === 0) {
                container.innerHTML = '<div class="no-data">No users found</div>';
                return;
            }
            
            let html = '<table><thead><tr><th>Email</th><th>Full Name</th><th>Balance</th><th>KYC Status</th><th>Joined</th></tr></thead><tbody>';
            users.forEach(user => {
                const kycStatus = user.kyc_status === 'verified' ? '✅ Verified' : '⏳ Pending';
                html += `<tr>
                    <td>${user.email}</td>
                    <td>${user.full_name || 'N/A'}</td>
                    <td>$${user.balance || 0}</td>
                    <td>${kycStatus}</td>
                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        } catch(e) { console.error(e); }
    }
    
    async function loadStats() {
        try {
            const { data: users } = await supabase.from('users').select('*');
            const { data: trades } = await supabase.from('trades').select('*');
            const { data: kyc } = await supabase.from('kyc_requests').select('*').eq('status', 'pending');
            const { data: deposits } = await supabase.from('deposits').select('*').eq('status', 'pending');
            
            document.getElementById('totalUsers').innerText = users?.length || 0;
            document.getElementById('pendingTrades').innerText = trades?.filter(t => t.status === 'pending').length || 0;
            document.getElementById('pendingKYC').innerText = kyc?.length || 0;
            document.getElementById('pendingDeposits').innerText = deposits?.length || 0;
        } catch(e) { console.error(e); }
    }
    
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        localStorage.setItem('adminTheme', isLight ? 'light' : 'dark');
    }
    
    function checkTheme() {
        if (localStorage.getItem('adminTheme') === 'light') {
            document.body.classList.add('light-mode');
        }
    }
    
    checkTheme();
</script>
</body>
</html>
