<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
            font-size: 1rem;
        }

        .nav-links a:hover {
            color: #00d4ff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .username {
            color: #00d4ff;
            font-weight: 500;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-decoration: none;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.3);
            border-color: rgba(255, 68, 68, 0.5);
        }

        .main-content {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 20px 60px;
        }

        .badge {
            background: rgba(0, 212, 255, 0.15);
            display: inline-block;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 0.85rem;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 5rem;
            margin-bottom: 20px;
            line-height: 1.2;
            font-weight: 700;
        }

        .gradient-text {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            line-height: 1.6;
            max-width: 600px;
        }

        .start-btn {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            padding: 14px 48px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 212, 255, 0.3);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            margin-top: 60px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .stat-card .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }

        .stat-card .stat-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #00ff88;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }
            .nav-links {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
            h1 {
                font-size: 2.5rem;
            }
            .stats-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">📈 Luno Trading</div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="markets.html">Markets</a>
        <a href="trade.html">Trades</a>
        <a href="profile.html">My Profile</a>
    </div>
    <div class="user-info">
        <span class="username" id="displayUsername">Trader</span>
        <a href="#" class="logout-btn" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="main-content">
    <div class="badge">⚡ Welcome to Luno Trading</div>
    <h1>
        Trade <span class="gradient-text">Smarter,</span><br>
        Trade Better
    </h1>
    <p class="subtitle">
        Empower your trading journey with real-time insights and expert analysis.
    </p>
    <button class="start-btn" onclick="goToTrade()">🚀 Start Trading</button>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-label">Your Balance</div>
            <div class="stat-value" id="balance">$10,000</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Trades</div>
            <div class="stat-value" id="totalTrades">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Win Rate</div>
            <div class="stat-value" id="winRate">0%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Profit Today</div>
            <div class="stat-value" id="profitToday">+$0</div>
        </div>
    </div>
</div>

<script>
    // Check if user is logged in
    function checkAuth() {
        const savedUser = localStorage.getItem('lunoUser') || sessionStorage.getItem('lunoUser');
        if (!savedUser) {
            window.location.href = 'index.html';
        }
        return savedUser ? JSON.parse(savedUser) : null;
    }

    // Display username
    function displayUsername() {
        const user = checkAuth();
        if (user && user.fullName) {
            document.getElementById('displayUsername').innerText = user.fullName.split(' ')[0];
        } else if (user && user.email) {
            document.getElementById('displayUsername').innerText = user.email.split('@')[0];
        }
    }

    // Update dashboard stats
    function updateStats() {
        const profile = JSON.parse(localStorage.getItem('lunoProfile') || '{"balance": 10000}');
        document.getElementById('balance').innerText = `$${profile.balance.toLocaleString()}`;
        
        // Random stats for demo
        const totalTrades = Math.floor(Math.random() * 50);
        const winRate = Math.floor(Math.random() * 100);
        const profitToday = (Math.random() * 500 - 100).toFixed(2);
        
        document.getElementById('totalTrades').innerText = totalTrades;
        document.getElementById('winRate').innerText = winRate + '%';
        
        if (profitToday >= 0) {
            document.getElementById('profitToday').innerHTML = `+$${profitToday}`;
            document.getElementById('profitToday').style.color = '#00ff88';
        } else {
            document.getElementById('profitToday').innerHTML = `-$${Math.abs(profitToday)}`;
            document.getElementById('profitToday').style.color = '#ff4444';
        }
    }

    function goToTrade() {
        window.location.href = 'trade.html';
    }

    function logout() {
        localStorage.removeItem('lunoUser');
        sessionStorage.removeItem('lunoUser');
        window.location.href = 'index.html';
    }

    // Initialize
    displayUsername();
    updateStats();
    setInterval(updateStats, 10000);
</script>

</body>
</html>
