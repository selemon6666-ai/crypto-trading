<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Advanced Trading View</title>
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #131722;
            color: #d1d4dc;
            transition: background 0.3s, color 0.3s;
        }

        /* Light Mode */
        body.light-mode {
            background: #ffffff;
            color: #1e222d;
        }

        body.light-mode .navbar,
        body.light-mode .chart-panel,
        body.light-mode .orderbook-panel,
        body.light-mode .trade-panel {
            background: #ffffff;
            border-color: #e0e0e0;
        }

        body.light-mode .tf-btn,
        body.light-mode .trade-input,
        body.light-mode .perc-btn {
            background: #f0f0f0;
            color: #1e222d;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #d1d4dc;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .nav-links a:hover {
            color: #00d4ff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username {
            color: #00d4ff;
            font-size: 0.85rem;
        }

        .theme-toggle {
            background: rgba(0, 212, 255, 0.15);
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .logout-btn {
            background: rgba(255, 68, 68, 0.15);
            padding: 5px 14px;
            border-radius: 6px;
            cursor: pointer;
            color: #ff4444;
            font-size: 0.8rem;
        }

        .back-button {
            margin: 55px 15px 0 15px;
        }

        .back-btn {
            background: rgba(0, 212, 255, 0.15);
            padding: 5px 14px;
            border-radius: 6px;
            cursor: pointer;
            color: #00d4ff;
            text-decoration: none;
            font-size: 0.75rem;
        }

        /* Main Layout - 3 Column */
        .trading-layout {
            display: flex;
            margin-top: 50px;
            height: calc(100vh - 50px);
        }

        /* Left Panel - Chart Area */
        .chart-area {
            flex: 2.5;
            display: flex;
            flex-direction: column;
            background: #131722;
            border-right: 1px solid #2a2e39;
        }

        .chart-header {
            padding: 10px 15px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
        }

        .symbol-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .symbol-info {
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .symbol {
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
        }

        .price {
            font-size: 1.6rem;
            font-weight: bold;
            color: #00ff88;
        }

        .change {
            font-size: 0.85rem;
            padding: 3px 8px;
            border-radius: 12px;
        }

        .change.positive { background: rgba(0, 255, 136, 0.15); color: #00ff88; }
        .change.negative { background: rgba(255, 68, 68, 0.15); color: #ff4444; }

        /* Timeframes */
        .timeframes {
            display: flex;
            gap: 3px;
            background: #2a2e39;
            padding: 3px;
            border-radius: 6px;
        }

        .tf-btn {
            background: transparent;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            color: #d1d4dc;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .tf-btn:hover, .tf-btn.active {
            background: #00d4ff;
            color: #131722;
        }

        /* Chart Container */
        #chart-container {
            flex: 1;
            width: 100%;
            min-height: 450px;
        }

        /* Indicators Bar */
        .indicators-bar {
            display: flex;
            gap: 20px;
            padding: 8px 15px;
            background: #1e222d;
            border-top: 1px solid #2a2e39;
            font-size: 0.7rem;
        }

        .indicator {
            display: flex;
            gap: 5px;
        }

        .indicator-label { color: #787b86; }
        .indicator-value { font-weight: bold; color: #00d4ff; }

        /* Middle Panel - Order Book */
        .orderbook-area {
            width: 280px;
            background: #1e222d;
            border-right: 1px solid #2a2e39;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 10px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #787b86;
            border-bottom: 1px solid #2a2e39;
            text-transform: uppercase;
        }

        .orderbook-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 8px 12px;
            font-size: 0.65rem;
            color: #787b86;
            border-bottom: 1px solid #2a2e39;
        }

        .orderbook-asks {
            flex: 1;
            max-height: 40%;
            overflow-y: auto;
        }

        .orderbook-bids {
            flex: 1;
            max-height: 40%;
            overflow-y: auto;
        }

        .orderbook-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-family: monospace;
        }

        .orderbook-row.ask { color: #ff4444; }
        .orderbook-row.bid { color: #00ff88; }

        .spread {
            text-align: center;
            padding: 6px;
            font-size: 0.65rem;
            color: #787b86;
            border-top: 1px solid #2a2e39;
            border-bottom: 1px solid #2a2e39;
        }

        /* Right Panel - Trading */
        .trade-area {
            width: 300px;
            background: #1e222d;
            display: flex;
            flex-direction: column;
        }

        .stats-section {
            padding: 12px;
            border-bottom: 1px solid #2a2e39;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.7rem;
        }

        .trade-section {
            padding: 12px;
        }

        .trade-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .trade-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .trade-tab.buy {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .trade-tab.sell {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.2);
        }

        .trade-tab.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
            border: none;
        }

        .trade-input {
            width: 100%;
            padding: 10px;
            background: #2a2e39;
            border: 1px solid #3a3e49;
            border-radius: 6px;
            color: white;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .perc-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .perc-btn {
            flex: 1;
            padding: 5px;
            background: #2a2e39;
            border: none;
            border-radius: 4px;
            color: #d1d4dc;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .trade-action-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .trade-action-btn.buy { background: linear-gradient(135deg, #00ff88, #00cc6a); color: white; }
        .trade-action-btn.sell { background: linear-gradient(135deg, #ff4444, #cc0000); color: white; }

        /* Alerts & Addresses */
        .alerts-section, .addresses-section {
            padding: 12px;
            border-top: 1px solid #2a2e39;
        }

        .section-title {
            font-size: 0.7rem;
            color: #787b86;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .add-btn {
            background: rgba(0, 212, 255, 0.2);
            border: none;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            color: #00d4ff;
            font-size: 0.65rem;
        }

        .alert-item, .address-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 0.7rem;
            border-bottom: 1px solid #2a2e39;
        }

        .remove-item {
            background: rgba(255, 68, 68, 0.2);
            border: none;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            color: #ff4444;
            font-size: 0.6rem;
        }

        @media (max-width: 1100px) {
            .orderbook-area { display: none; }
        }

        @media (max-width: 800px) {
            .trade-area { width: 260px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">📈 Luno Trading</div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="markets.html">Markets</a>
        <a href="trade.html">Trades</a>
        <a href="profile.html">Profile</a>
    </div>
    <div class="user-info">
        <span class="username" id="displayUsername">Trader</span>
        <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
        <a href="#" class="logout-btn" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="back-button">
    <a href="markets.html" class="back-btn">← Markets</a>
</div>

<div class="trading-layout">
    <!-- LEFT: Chart Area -->
    <div class="chart-area">
        <div class="chart-header">
            <div class="symbol-row">
                <div class="symbol-info">
                    <span class="symbol" id="coinSymbol">BTC/USDT</span>
                    <span class="price" id="currentPrice">$0.00</span>
                    <span class="change" id="priceChange">0.00%</span>
                </div>
                <div class="timeframes">
                    <button class="tf-btn" data-timeframe="1">1m</button>
                    <button class="tf-btn" data-timeframe="5">5m</button>
                    <button class="tf-btn" data-timeframe="15">15m</button>
                    <button class="tf-btn active" data-timeframe="60">1h</button>
                    <button class="tf-btn" data-timeframe="240">4h</button>
                    <button class="tf-btn" data-timeframe="1440">1d</button>
                    <button class="tf-btn" data-timeframe="10080">1w</button>
                </div>
            </div>
        </div>
        <div id="chart-container"></div>
        <div class="indicators-bar">
            <div class="indicator"><span class="indicator-label">RSI:</span> <span id="rsiValue" class="indicator-value">--</span></div>
            <div class="indicator"><span class="indicator-label">MACD:</span> <span id="macdValue" class="indicator-value">--</span></div>
            <div class="indicator"><span class="indicator-label">Signal:</span> <span id="signalValue" class="indicator-value">--</span></div>
            <div class="indicator"><span class="indicator-label">Volume:</span> <span id="volumeValue" class="indicator-value">--</span></div>
        </div>
    </div>

    <!-- MIDDLE: Order Book -->
    <div class="orderbook-area">
        <div class="panel-header">Order Book</div>
        <div class="orderbook-header">
            <span>Price(USDT)</span><span>Amount</span><span>Total</span>
        </div>
        <div class="orderbook-asks" id="orderbookAsks"></div>
        <div class="spread" id="spreadDisplay">Spread: 0.00</div>
        <div class="orderbook-bids" id="orderbookBids"></div>
    </div>

    <!-- RIGHT: Trading Panel -->
    <div class="trade-area">
        <div class="stats-section">
            <div class="stat-row"><span>24h High</span><span id="high24h">$0.00</span></div>
            <div class="stat-row"><span>24h Low</span><span id="low24h">$0.00</span></div>
            <div class="stat-row"><span>24h Volume</span><span id="volume24h">$0</span></div>
            <div class="stat-row"><span>Market Cap</span><span id="marketCap">$0</span></div>
        </div>

        <div class="trade-section">
            <div class="trade-tabs">
                <div class="trade-tab buy active" onclick="setTradeType('buy')">BUY</div>
                <div class="trade-tab sell" onclick="setTradeType('sell')">SELL</div>
            </div>
            <input type="number" id="tradeAmount" class="trade-input" placeholder="Amount (USDT)" oninput="updateTotal()">
            <div class="perc-buttons">
                <button class="perc-btn" onclick="setPercentage(25)">25%</button>
                <button class="perc-btn" onclick="setPercentage(50)">50%</button>
                <button class="perc-btn" onclick="setPercentage(75)">75%</button>
                <button class="perc-btn" onclick="setPercentage(100)">100%</button>
            </div>
            <div class="stat-row"><span>Total:</span><span id="totalAmount">$0.00</span></div>
            <button class="trade-action-btn buy" id="tradeActionBtn" onclick="executeTrade()">BUY</button>
        </div>

        <div class="alerts-section">
            <div class="section-title">
                <span>Price Alerts</span>
                <button class="add-btn" onclick="addPriceAlert()">+ Add</button>
            </div>
            <div id="alertsList"></div>
        </div>

        <div class="addresses-section">
            <div class="section-title">
                <span>Saved Addresses</span>
                <button class="add-btn" onclick="addAddress()">+ Add</button>
            </div>
            <div id="addressesList"></div>
        </div>
    </div>
</div>

<script>
    // ============================================
    // ADVANCED TRADING VIEW - COINBASE STYLE
    // ============================================
    
    let chart = null;
    let candleSeries = null;
    let volumeSeries = null;
    let currentSymbol = 'BTC';
    let currentTimeframe = '60';
    let tradeType = 'buy';
    let currentPrice = 0;
    let userBalance = 0;
    let priceAlerts = JSON.parse(localStorage.getItem('priceAlerts') || '[]');
    let savedAddresses = JSON.parse(localStorage.getItem('savedAddresses') || '[]');
    
    const coinGeckoIds = {
        'BTC': 'bitcoin', 'ETH': 'ethereum', 'SOL': 'solana', 'DOGE': 'dogecoin',
        'BNB': 'binancecoin', 'XRP': 'ripple', 'ADA': 'cardano', 'AVAX': 'avalanche-2'
    };
    
    const coinNames = {
        'BTC': 'Bitcoin', 'ETH': 'Ethereum', 'SOL': 'Solana', 'DOGE': 'Dogecoin',
        'BNB': 'Binance Coin', 'XRP': 'XRP', 'ADA': 'Cardano', 'AVAX': 'Avalanche'
    };
    
    const fallbackPrices = {
        'BTC': 65234.50, 'ETH': 3420.75, 'SOL': 145.30, 'DOGE': 0.124,
        'BNB': 580.20, 'XRP': 0.62, 'ADA': 0.48, 'AVAX': 38.75
    };
    
    // Get selected coin from URL
    function getSelectedCoin() {
        const params = new URLSearchParams(window.location.search);
        const symbol = params.get('symbol');
        if (symbol) currentSymbol = symbol;
        else {
            const saved = localStorage.getItem('selectedCrypto');
            if (saved) {
                try { currentSymbol = JSON.parse(saved).symbol; } catch(e) {}
            }
        }
        document.getElementById('coinSymbol').innerText = `${currentSymbol}/USDT`;
    }
    
    // Fetch real-time price
    async function fetchRealTimePrice() {
        if (fallbackPrices[currentSymbol]) {
            currentPrice = fallbackPrices[currentSymbol];
            document.getElementById('currentPrice').innerText = `$${currentPrice.toLocaleString()}`;
        }
        try {
            const coinId = coinGeckoIds[currentSymbol];
            if (coinId) {
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coinId}&vs_currencies=usd&include_24hr_change=true&include_market_cap=true&include_24hr_vol=true`);
                if (response.ok) {
                    const data = await response.json();
                    if (data[coinId]) {
                        currentPrice = data[coinId].usd;
                        document.getElementById('currentPrice').innerText = `$${currentPrice.toLocaleString()}`;
                        const change = data[coinId].usd_24h_change || 0;
                        const changeElem = document.getElementById('priceChange');
                        changeElem.innerText = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                        changeElem.className = `change ${change >= 0 ? 'positive' : 'negative'}`;
                        document.getElementById('volume24h').innerText = `$${(data[coinId].usd_24h_vol || 0).toLocaleString()}`;
                        document.getElementById('marketCap').innerText = `$${(data[coinId].usd_market_cap || 0).toLocaleString()}`;
                        checkPriceAlerts(currentPrice);
                    }
                }
            }
        } catch(e) { console.log('Price fetch failed, using fallback'); }
        document.getElementById('high24h').innerText = `$${(currentPrice * 1.02).toLocaleString()}`;
        document.getElementById('low24h').innerText = `$${(currentPrice * 0.98).toLocaleString()}`;
        updateOrderBook(currentPrice);
    }
    
    // Update order book
    function updateOrderBook(price) {
        const spread = price * 0.001;
        const bidPrice = price - spread;
        const askPrice = price + spread;
        document.getElementById('spreadDisplay').innerHTML = `Spread: $${spread.toFixed(2)} (${(spread/price*100).toFixed(3)}%)`;
        
        let asksHtml = '', bidsHtml = '';
        for (let i = 1; i <= 10; i++) {
            const ask = askPrice + (i * spread);
            const amount = (Math.random() * 0.8 + 0.2).toFixed(4);
            asksHtml += `<div class="orderbook-row ask"><span>${ask.toFixed(2)}</span><span>${amount}</span><span>${(ask * amount).toFixed(0)}</span></div>`;
        }
        for (let i = 1; i <= 10; i++) {
            const bid = bidPrice - (i * spread);
            const amount = (Math.random() * 0.8 + 0.2).toFixed(4);
            bidsHtml += `<div class="orderbook-row bid"><span>${bid.toFixed(2)}</span><span>${amount}</span><span>${(bid * amount).toFixed(0)}</span></div>`;
        }
        document.getElementById('orderbookAsks').innerHTML = asksHtml;
        document.getElementById('orderbookBids').innerHTML = bidsHtml;
    }
    
    // Generate candlestick data
    async function fetchCandlestickData() {
        const data = [];
        let basePrice = fallbackPrices[currentSymbol] || 50000;
        const now = Math.floor(Date.now() / 1000);
        const points = currentTimeframe === '1' ? 60 : currentTimeframe === '5' ? 60 : 
                       currentTimeframe === '15' ? 60 : currentTimeframe === '60' ? 48 : 
                       currentTimeframe === '240' ? 42 : 30;
        
        for (let i = points; i >= 0; i--) {
            const change = (Math.random() - 0.5) * (basePrice * 0.008);
            const open = basePrice;
            const close = basePrice + change;
            const high = Math.max(open, close) + Math.random() * (basePrice * 0.005);
            const low = Math.min(open, close) - Math.random() * (basePrice * 0.005);
            data.push({ time: now - (i * 3600), open, high, low, close });
            basePrice = close;
        }
        return data;
    }
    
    // Calculate technical indicators
    function calculateIndicators(data) {
        if (!data || data.length < 14) return;
        // RSI
        let gains = 0, losses = 0;
        for (let i = data.length - 14; i < data.length - 1; i++) {
            const change = data[i+1].close - data[i].close;
            if (change >= 0) gains += change;
            else losses -= change;
        }
        const rs = (gains / 14) / (losses / 14);
        const rsi = 100 - (100 / (1 + rs));
        document.getElementById('rsiValue').innerText = rsi.toFixed(2);
        
        // MACD
        const ema12 = data[data.length-1].close * 0.15 + data[data.length-2].close * 0.85;
        const ema26 = data[data.length-1].close * 0.07 + data[data.length-2].close * 0.93;
        const macd = ema12 - ema26;
        document.getElementById('macdValue').innerText = macd.toFixed(2);
        document.getElementById('signalValue').innerText = (macd * 0.8).toFixed(2);
        document.getElementById('volumeValue').innerText = (Math.random() * 1000000).toFixed(0);
    }
    
    // Initialize chart
    async function initChart() {
        const container = document.getElementById('chart-container');
        chart = LightweightCharts.createChart(container, {
            width: container.clientWidth, height: 450,
            layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#2a2e39' },
            timeScale: { borderColor: '#2a2e39', timeVisible: true, secondsVisible: false },
        });
        
        candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88', downColor: '#ff4444',
            borderDownColor: '#ff4444', borderUpColor: '#00ff88',
            wickDownColor: '#ff4444', wickUpColor: '#00ff88',
        });
        
        const data = await fetchCandlestickData();
        candleSeries.setData(data);
        calculateIndicators(data);
        
        window.addEventListener('resize', () => chart.applyOptions({ width: container.clientWidth }));
    }
    
    async function updateChart() {
        if (candleSeries) {
            const data = await fetchCandlestickData();
            candleSeries.setData(data);
            calculateIndicators(data);
        }
    }
    
    // Price alerts
    function checkPriceAlerts(price) {
        priceAlerts.forEach((alert, i) => {
            if (alert.price <= price && !alert.triggered) {
                alert.triggered = true;
                alert(`🔔 ${alert.symbol} reached $${price.toLocaleString()}`);
                localStorage.setItem('priceAlerts', JSON.stringify(priceAlerts));
                renderAlerts();
            }
        });
    }
    
    function addPriceAlert() {
        const price = prompt('Enter alert price (USDT):');
        if (price && !isNaN(price)) {
            priceAlerts.push({ symbol: currentSymbol, price: parseFloat(price), triggered: false });
            localStorage.setItem('priceAlerts', JSON.stringify(priceAlerts));
            renderAlerts();
        }
    }
    
    function removeAlert(i) {
        priceAlerts.splice(i, 1);
        localStorage.setItem('priceAlerts', JSON.stringify(priceAlerts));
        renderAlerts();
    }
    
    function renderAlerts() {
        const container = document.getElementById('alertsList');
        if (priceAlerts.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:8px;color:#787b86;">No alerts</div>';
            return;
        }
        container.innerHTML = priceAlerts.map((a, i) => `
            <div class="alert-item"><span>${a.symbol} @ $${a.price.toLocaleString()}</span>
            <button class="remove-item" onclick="removeAlert(${i})">✕</button></div>
        `).join('');
    }
    
    // Address book
    function addAddress() {
        const address = prompt('Enter wallet address:');
        const label = prompt('Label (e.g., Exchange):');
        if (address && label) {
            savedAddresses.push({ address, label });
            localStorage.setItem('savedAddresses', JSON.stringify(savedAddresses));
            renderAddresses();
        }
    }
    
    function removeAddress(i) {
        savedAddresses.splice(i, 1);
        localStorage.setItem('savedAddresses', JSON.stringify(savedAddresses));
        renderAddresses();
    }
    
    function renderAddresses() {
        const container = document.getElementById('addressesList');
        if (savedAddresses.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:8px;color:#787b86;">No addresses</div>';
            return;
        }
        container.innerHTML = savedAddresses.map((a, i) => `
            <div class="address-item"><span title="${a.address}">${a.label}: ${a.address.substring(0, 12)}...</span>
            <button class="remove-item" onclick="removeAddress(${i})">✕</button></div>
        `).join('');
    }
    
    // Trading functions
    function updateTotal() {
        const amount = parseFloat(document.getElementById('tradeAmount').value) || 0;
        document.getElementById('totalAmount').innerText = `$${amount.toFixed(2)}`;
    }
    
    function setPercentage(percent) {
        const amount = (userBalance * percent / 100).toFixed(2);
        document.getElementById('tradeAmount').value = amount;
        updateTotal();
    }
    
    function setTradeType(type) {
        tradeType = type;
        const buyTab = document.querySelector('.trade-tab.buy');
        const sellTab = document.querySelector('.trade-tab.sell');
        const actionBtn = document.getElementById('tradeActionBtn');
        if (type === 'buy') {
            buyTab.classList.add('active'); sellTab.classList.remove('active');
            actionBtn.className = 'trade-action-btn buy'; actionBtn.innerText = 'BUY';
        } else {
            sellTab.classList.add('active'); buyTab.classList.remove('active');
            actionBtn.className = 'trade-action-btn sell'; actionBtn.innerText = 'SELL';
        }
    }
    
    function executeTrade() {
        const amount = parseFloat(document.getElementById('tradeAmount').value);
        if (!amount || amount <= 0) { alert('Enter valid amount'); return; }
        if (amount > userBalance && tradeType === 'buy') {
            alert(`Insufficient balance! You have $${userBalance.toFixed(2)}`);
            return;
        }
        
        const user = JSON.parse(localStorage.getItem('lunoUser') || sessionStorage.getItem('lunoUser') || '{}');
        console.log(`📧 Trade notification to ${user.email}: ${tradeType.toUpperCase()} ${amount} ${currentSymbol}`);
        
        alert(`${tradeType.toUpperCase()} order placed!\nAmount: ${amount} USDT\nPrice: $${currentPrice.toFixed(2)}`);
        
        if (tradeType === 'buy') {
            userBalance -= amount;
            const profile = JSON.parse(localStorage.getItem('lunoProfile') || '{"balance": 0}');
            profile.balance = userBalance;
            localStorage.setItem('lunoProfile', JSON.stringify(profile));
        }
        document.getElementById('tradeAmount').value = '';
        updateTotal();
    }
    
    // Auth functions
    function checkAuth() {
        const savedUser = localStorage.getItem('lunoUser') || sessionStorage.getItem('lunoUser');
        if (!savedUser) window.location.href = 'index.html';
        return savedUser ? JSON.parse(savedUser) : null;
    }
    
    function displayUsername() {
        const user = checkAuth();
        if (user) document.getElementById('displayUsername').innerText = user.fullName?.split(' ')[0] || user.email?.split('@')[0] || 'Trader';
    }
    
    function loadUserBalance() {
        const profile = JSON.parse(localStorage.getItem('lunoProfile') || '{"balance": 0}');
        userBalance = profile.balance;
    }
    
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        if (chart) {
            chart.applyOptions({
                layout: { backgroundColor: isLight ? '#ffffff' : '#131722', textColor: isLight ? '#1e222d' : '#d1d4dc' },
                grid: { vertLines: { color: isLight ? '#e0e0e0' : '#2a2e39' }, horzLines: { color: isLight ? '#e0e0e0' : '#2a2e39' } }
            });
        }
    }
    
    function checkTheme() {
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
    }
    
    function logout() { localStorage.removeItem('lunoUser'); sessionStorage.removeItem('lunoUser'); window.location.href = 'index.html'; }
    
    // Event listeners
    document.querySelectorAll('.tf-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTimeframe = btn.getAttribute('data-timeframe');
            await updateChart();
        });
    });
    
    document.getElementById('tradeAmount').addEventListener('input', updateTotal);
    
    // Initialize
    checkAuth();
    displayUsername();
    loadUserBalance();
    getSelectedCoin();
    initChart();
    fetchRealTimePrice();
    renderAlerts();
    renderAddresses();
    checkTheme();
    
    setInterval(fetchRealTimePrice, 15000);
    setInterval(updateChart, 60000);
</script>

</body>
</html>
