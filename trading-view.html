<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Advanced Trading View</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #131722;
            color: #d1d4dc;
            transition: background 0.3s, color 0.3s;
        }

        body.light-mode {
            background: #ffffff;
            color: #1e222d;
        }

        body.light-mode .navbar,
        body.light-mode .chart-panel,
        body.light-mode .stats-card,
        body.light-mode .trade-card,
        body.light-mode .orderbook-card {
            background: #ffffff;
            border-color: #e0e0e0;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 24px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            color: #d1d4dc;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #00d4ff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .username {
            color: #00d4ff;
            font-size: 0.85rem;
        }

        .theme-toggle {
            background: rgba(0, 212, 255, 0.15);
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .logout-btn {
            background: rgba(255, 68, 68, 0.15);
            padding: 4px 14px;
            border-radius: 6px;
            cursor: pointer;
            color: #ff4444;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        /* Main Trading Layout - Coinbase Style */
        .trading-layout {
            display: flex;
            margin-top: 50px;
            height: calc(100vh - 50px);
        }

        /* Left Section - Chart */
        .chart-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2e39;
        }

        /* Chart Header */
        .chart-header {
            padding: 12px 20px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .coin-details {
            display: flex;
            align-items: baseline;
            gap: 16px;
            flex-wrap: wrap;
        }

        .coin-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
        }

        .coin-price {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00ff88;
        }

        .price-change {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .price-change.up {
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
        }

        .price-change.down {
            background: rgba(255, 68, 68, 0.15);
            color: #ff4444;
        }

        /* Timeframes */
        .timeframes {
            display: flex;
            gap: 4px;
            background: #2a2e39;
            padding: 4px;
            border-radius: 8px;
        }

        .tf-btn {
            background: transparent;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            color: #d1d4dc;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
        }

        .tf-btn:hover, .tf-btn.active {
            background: #00d4ff;
            color: #131722;
        }

        /* Chart Container */
        #chart-container {
            width: 100%;
            height: 450px;
            background: #131722;
        }

        /* Depth Chart */
        .depth-container {
            height: 150px;
            margin-top: 10px;
            padding: 10px;
            background: #1e222d;
            border-top: 1px solid #2a2e39;
        }

        #depth-chart {
            width: 100%;
            height: 100%;
        }

        /* Middle Section - Order Book */
        .orderbook-section {
            width: 320px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2e39;
            background: #1e222d;
        }

        .orderbook-header {
            padding: 12px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            border-bottom: 1px solid #2a2e39;
        }

        .orderbook-columns {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 8px 12px;
            font-size: 0.7rem;
            color: #787b86;
            border-bottom: 1px solid #2a2e39;
        }

        .orderbook-asks {
            flex: 1;
            overflow-y: auto;
            max-height: 40%;
        }

        .orderbook-bids {
            flex: 1;
            overflow-y: auto;
            max-height: 40%;
        }

        .orderbook-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-family: monospace;
        }

        .orderbook-row.ask { color: #ff4444; }
        .orderbook-row.bid { color: #00ff88; }

        .orderbook-spread {
            text-align: center;
            padding: 8px;
            font-size: 0.7rem;
            color: #787b86;
            border-top: 1px solid #2a2e39;
            border-bottom: 1px solid #2a2e39;
        }

        /* Right Section - Trade Panel */
        .trade-section {
            width: 300px;
            display: flex;
            flex-direction: column;
            background: #1e222d;
        }

        /* Market Stats */
        .market-stats {
            padding: 12px;
            border-bottom: 1px solid #2a2e39;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.75rem;
        }

        /* Trade Tabs */
        .trade-tabs {
            display: flex;
            margin: 12px;
            gap: 8px;
        }

        .trade-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .trade-tab.buy {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .trade-tab.sell {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.2);
        }

        .trade-tab.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
            border: none;
        }

        /* Order Form */
        .order-form {
            padding: 0 12px;
        }

        .order-input {
            width: 100%;
            padding: 10px;
            background: #2a2e39;
            border: 1px solid #3a3e49;
            border-radius: 8px;
            color: white;
            margin-bottom: 12px;
            font-size: 0.85rem;
        }

        .percent-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }

        .percent-btn {
            flex: 1;
            padding: 5px;
            background: #2a2e39;
            border: none;
            border-radius: 4px;
            color: #d1d4dc;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            margin: 10px 0;
            border-top: 1px solid #2a2e39;
        }

        .place-order-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .place-order-btn.buy {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: white;
        }

        .place-order-btn.sell {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
        }

        /* Recent Trades */
        .recent-trades {
            margin-top: 15px;
            padding: 12px;
            border-top: 1px solid #2a2e39;
        }

        .recent-trades-title {
            font-size: 0.7rem;
            color: #787b86;
            margin-bottom: 8px;
        }

        .trade-history-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.7rem;
        }

        @media (max-width: 1200px) {
            .orderbook-section {
                width: 280px;
            }
            .trade-section {
                width: 280px;
            }
        }

        @media (max-width: 1000px) {
            .orderbook-section {
                display: none;
            }
        }

        @media (max-width: 800px) {
            .trade-section {
                width: 260px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">📈 Luno Trading</div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="markets.html">Markets</a>
        <a href="trade.html">Trades</a>
        <a href="profile.html">Profile</a>
    </div>
    <div class="user-info">
        <span class="username" id="displayUsername">Trader</span>
        <div class="theme-toggle" onclick="toggleTheme()">🌓 Theme</div>
        <a href="#" class="logout-btn" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="trading-layout">
    <!-- Left: Chart Section -->
    <div class="chart-section">
        <div class="chart-header">
            <div class="coin-details">
                <span class="coin-name" id="coinName">BTC/USDT</span>
                <span class="coin-price" id="currentPrice">$0.00</span>
                <span class="price-change" id="priceChange">0.00%</span>
            </div>
            <div class="timeframes">
                <button class="tf-btn" data-timeframe="1">1m</button>
                <button class="tf-btn" data-timeframe="5">5m</button>
                <button class="tf-btn" data-timeframe="15">15m</button>
                <button class="tf-btn active" data-timeframe="60">1h</button>
                <button class="tf-btn" data-timeframe="240">4h</button>
                <button class="tf-btn" data-timeframe="1440">1d</button>
                <button class="tf-btn" data-timeframe="10080">1w</button>
            </div>
        </div>
        <div id="chart-container"></div>
        <div class="depth-container">
            <canvas id="depth-chart"></canvas>
        </div>
    </div>

    <!-- Middle: Order Book -->
    <div class="orderbook-section">
        <div class="orderbook-header">📖 Order Book</div>
        <div class="orderbook-columns">
            <span>Price (USDT)</span>
            <span>Amount</span>
            <span>Total</span>
        </div>
        <div class="orderbook-asks" id="orderbookAsks"></div>
        <div class="orderbook-spread" id="orderbookSpread"></div>
        <div class="orderbook-bids" id="orderbookBids"></div>
    </div>

    <!-- Right: Trade Panel -->
    <div class="trade-section">
        <div class="market-stats">
            <div class="stat-item"><span>24h High</span><span id="high24h">$0.00</span></div>
            <div class="stat-item"><span>24h Low</span><span id="low24h">$0.00</span></div>
            <div class="stat-item"><span>24h Volume</span><span id="volume24h">$0</span></div>
            <div class="stat-item"><span>Market Cap</span><span id="marketCap">$0</span></div>
        </div>

        <div class="trade-tabs">
            <div class="trade-tab buy active" onclick="setTradeType('buy')">Buy</div>
            <div class="trade-tab sell" onclick="setTradeType('sell')">Sell</div>
        </div>

        <div class="order-form">
            <input type="number" id="tradeAmount" class="order-input" placeholder="Amount (USDT)" oninput="updateTotal()">
            <div class="percent-buttons">
                <button class="percent-btn" onclick="setPercentage(25)">25%</button>
                <button class="percent-btn" onclick="setPercentage(50)">50%</button>
                <button class="percent-btn" onclick="setPercentage(75)">75%</button>
                <button class="percent-btn" onclick="setPercentage(100)">100%</button>
            </div>
            <input type="text" id="tradePrice" class="order-input" placeholder="Market Price" readonly>
            <div class="total-row">
                <span>Total</span>
                <span id="totalAmount">$0.00</span>
            </div>
            <button class="place-order-btn buy" id="tradeActionBtn" onclick="executeTrade()">Buy</button>
        </div>

        <div class="recent-trades">
            <div class="recent-trades-title">🕐 Recent Trades</div>
            <div id="recentTradesList"></div>
        </div>
    </div>
</div>

<script>
    // Chart variables
    let chart = null;
    let candleSeries = null;
    let depthChart = null;
    let currentSymbol = 'BTC';
    let currentTimeframe = '60';
    let tradeType = 'buy';
    let currentPrice = 0;
    let userBalance = 0;
    let priceHistory = [];
    let recentTrades = [];
    
    // Coin mappings
    const coinNames = {
        'BTC': 'Bitcoin', 'ETH': 'Ethereum', 'SOL': 'Solana', 'DOGE': 'Dogecoin',
        'BNB': 'Binance Coin', 'XRP': 'XRP', 'ADA': 'Cardano', 'AVAX': 'Avalanche'
    };
    
    const fallbackPrices = {
        'BTC': 65234.50, 'ETH': 3420.75, 'SOL': 145.30, 'DOGE': 0.124,
        'BNB': 580.20, 'XRP': 0.62, 'ADA': 0.48, 'AVAX': 38.75
    };
    
    // Get selected coin
    function getSelectedCoin() {
        const params = new URLSearchParams(window.location.search);
        const symbol = params.get('symbol');
        if (symbol) currentSymbol = symbol;
        else {
            const saved = localStorage.getItem('selectedCrypto');
            if (saved) {
                try {
                    const crypto = JSON.parse(saved);
                    currentSymbol = crypto.symbol;
                } catch(e) {}
            }
        }
        document.getElementById('coinName').innerText = `${currentSymbol}/USDT`;
    }
    
    // Fetch price and update UI
    async function fetchRealTimePrice() {
        if (fallbackPrices[currentSymbol]) {
            currentPrice = fallbackPrices[currentSymbol];
            document.getElementById('currentPrice').innerText = `$${currentPrice.toLocaleString()}`;
        }
        
        try {
            const coinId = currentSymbol.toLowerCase();
            const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coinId}&vs_currencies=usd&include_24hr_change=true&include_market_cap=true&include_24hr_vol=true`);
            if (response.ok) {
                const data = await response.json();
                if (data[coinId]) {
                    currentPrice = data[coinId].usd;
                    const change = data[coinId].usd_24h_change || 0;
                    document.getElementById('currentPrice').innerText = `$${currentPrice.toLocaleString()}`;
                    const changeElem = document.getElementById('priceChange');
                    changeElem.innerText = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                    changeElem.className = `price-change ${change >= 0 ? 'up' : 'down'}`;
                    document.getElementById('volume24h').innerText = `$${(data[coinId].usd_24h_vol || 0).toLocaleString()}`;
                    document.getElementById('marketCap').innerText = `$${(data[coinId].usd_market_cap || 0).toLocaleString()}`;
                    document.getElementById('tradePrice').value = currentPrice.toFixed(2);
                    updateOrderBook(currentPrice);
                    updateDepthChart(currentPrice);
                }
            }
        } catch(e) { console.log('Background fetch failed'); }
        
        document.getElementById('high24h').innerText = `$${(currentPrice * 1.02).toLocaleString()}`;
        document.getElementById('low24h').innerText = `$${(currentPrice * 0.98).toLocaleString()}`;
    }
    
    // Update order book
    function updateOrderBook(price) {
        const spread = price * 0.001;
        const bidPrice = price - spread;
        const askPrice = price + spread;
        
        document.getElementById('orderbookSpread').innerHTML = `Spread: $${spread.toFixed(2)} (${(spread/price*100).toFixed(3)}%)`;
        
        const asksContainer = document.getElementById('orderbookAsks');
        const bidsContainer = document.getElementById('orderbookBids');
        
        let asksHtml = '';
        let bidsHtml = '';
        
        for (let i = 1; i <= 10; i++) {
            const ask = askPrice + (i * spread);
            const amount = (Math.random() * 0.8 + 0.2).toFixed(4);
            const total = (ask * amount).toFixed(0);
            asksHtml += `<div class="orderbook-row ask"><span>${ask.toFixed(2)}</span><span>${amount}</span><span>${parseInt(total).toLocaleString()}</span></div>`;
        }
        
        for (let i = 1; i <= 10; i++) {
            const bid = bidPrice - (i * spread);
            const amount = (Math.random() * 0.8 + 0.2).toFixed(4);
            const total = (bid * amount).toFixed(0);
            bidsHtml += `<div class="orderbook-row bid"><span>${bid.toFixed(2)}</span><span>${amount}</span><span>${parseInt(total).toLocaleString()}</span></div>`;
        }
        
        asksContainer.innerHTML = asksHtml;
        bidsContainer.innerHTML = bidsHtml;
    }
    
    // Update depth chart
    function updateDepthChart(price) {
        const canvas = document.getElementById('depth-chart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        canvas.width = width;
        canvas.height = height;
        
        ctx.clearRect(0, 0, width, height);
        
        // Draw bid side (green)
        ctx.fillStyle = 'rgba(0, 255, 136, 0.3)';
        for (let i = 0; i < 20; i++) {
            const x = i * (width / 40);
            const h = height * (1 - i / 40);
            ctx.fillRect(x, height - h, width / 40, h);
        }
        
        // Draw ask side (red)
        ctx.fillStyle = 'rgba(255, 68, 68, 0.3)';
        for (let i = 0; i < 20; i++) {
            const x = width / 2 + i * (width / 40);
            const h = height * (1 - (20 - i) / 40);
            ctx.fillRect(x, height - h, width / 40, h);
        }
        
        // Draw center line
        ctx.beginPath();
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = 2;
        ctx.moveTo(width / 2, 0);
        ctx.lineTo(width / 2, height);
        ctx.stroke();
    }
    
    // Generate candlestick data
    function generateChartData(timeframe) {
        const data = [];
        const basePrice = currentPrice || fallbackPrices[currentSymbol] || 50000;
        const now = Math.floor(Date.now() / 1000);
        const intervals = timeframe === '1' ? 60 : timeframe === '5' ? 60 : 
                         timeframe === '15' ? 96 : timeframe === '60' ? 168 : 
                         timeframe === '240' ? 180 : timeframe === '1440' ? 90 : 52;
        const intervalSeconds = timeframe === '1' ? 60 : timeframe === '5' ? 300 :
                                timeframe === '15' ? 900 : timeframe === '60' ? 3600 :
                                timeframe === '240' ? 14400 : timeframe === '1440' ? 86400 : 604800;
        
        let currentTime = now - (intervals * intervalSeconds);
        let price = basePrice;
        
        for (let i = 0; i <= intervals; i++) {
            const change = (Math.random() - 0.5) * (basePrice * 0.01);
            const open = price;
            const close = price + change;
            const high = Math.max(open, close) + Math.random() * (basePrice * 0.005);
            const low = Math.min(open, close) - Math.random() * (basePrice * 0.005);
            
            data.push({
                time: currentTime,
                open: open,
                high: high,
                low: low,
                close: close
            });
            
            price = close;
            currentTime += intervalSeconds;
        }
        return data;
    }
    
    // Initialize chart
    async function initChart() {
        const container = document.getElementById('chart-container');
        
        chart = LightweightCharts.createChart(container, {
            width: container.clientWidth,
            height: 450,
            layout: {
                backgroundColor: '#131722',
                textColor: '#d1d4dc',
            },
            grid: {
                vertLines: { color: '#2a2e39' },
                horzLines: { color: '#2a2e39' },
            },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#2a2e39' },
            timeScale: { borderColor: '#2a2e39', timeVisible: true, secondsVisible: false },
        });
        
        candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88',
            downColor: '#ff4444',
            borderDownColor: '#ff4444',
            borderUpColor: '#00ff88',
            wickDownColor: '#ff4444',
            wickUpColor: '#00ff88',
        });
        
        const chartData = generateChartData(currentTimeframe);
        candleSeries.setData(chartData);
        
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: container.clientWidth });
            updateDepthChart(currentPrice);
        });
    }
    
    // Update chart on timeframe change
    function updateChart() {
        if (candleSeries) {
            const chartData = generateChartData(currentTimeframe);
            candleSeries.setData(chartData);
        }
    }
    
    // Trade functions
    function updateTotal() {
        const amount = parseFloat(document.getElementById('tradeAmount').value) || 0;
        document.getElementById('totalAmount').innerText = `$${amount.toFixed(2)}`;
        addToRecentTrades(amount);
    }
    
    function setPercentage(percent) {
        const amount = (userBalance * percent / 100).toFixed(2);
        document.getElementById('tradeAmount').value = amount;
        updateTotal();
    }
    
    function setTradeType(type) {
        tradeType = type;
        const buyTab = document.querySelector('.trade-tab.buy');
        const sellTab = document.querySelector('.trade-tab.sell');
        const actionBtn = document.getElementById('tradeActionBtn');
        
        if (type === 'buy') {
            buyTab.classList.add('active');
            sellTab.classList.remove('active');
            actionBtn.className = 'place-order-btn buy';
            actionBtn.innerText = 'Buy';
        } else {
            sellTab.classList.add('active');
            buyTab.classList.remove('active');
            actionBtn.className = 'place-order-btn sell';
            actionBtn.innerText = 'Sell';
        }
    }
    
    function addToRecentTrades(amount) {
        const trade = {
            price: currentPrice,
            amount: amount,
            type: tradeType,
            time: new Date().toLocaleTimeString()
        };
        recentTrades.unshift(trade);
        if (recentTrades.length > 10) recentTrades.pop();
        
        const container = document.getElementById('recentTradesList');
        container.innerHTML = recentTrades.map(t => `
            <div class="trade-history-item">
                <span style="color: ${t.type === 'buy' ? '#00ff88' : '#ff4444'}">${t.type.toUpperCase()}</span>
                <span>${t.amount} USDT</span>
                <span>$${t.price.toFixed(2)}</span>
                <span>${t.time}</span>
            </div>
        `).join('');
    }
    
    function executeTrade() {
        const amount = parseFloat(document.getElementById('tradeAmount').value);
        if (!amount || amount <= 0) { alert('Please enter a valid amount'); return; }
        if (amount > userBalance && tradeType === 'buy') { alert(`Insufficient balance! You have $${userBalance.toFixed(2)}`); return; }
        
        if (tradeType === 'buy') {
            userBalance -= amount;
            const profile = JSON.parse(localStorage.getItem('lunoProfile') || '{"balance": 0}');
            profile.balance = userBalance;
            localStorage.setItem('lunoProfile', JSON.stringify(profile));
        }
        
        alert(`${tradeType.toUpperCase()} order placed!\n\nAmount: ${amount} USDT\nPrice: $${currentPrice.toFixed(2)}`);
        document.getElementById('tradeAmount').value = '';
        updateTotal();
    }
    
    // Theme toggle
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        
        if (chart) {
            chart.applyOptions({
                layout: { backgroundColor: isLight ? '#ffffff' : '#131722', textColor: isLight ? '#1e222d' : '#d1d4dc' },
                grid: { vertLines: { color: isLight ? '#e0e0e0' : '#2a2e39' }, horzLines: { color: isLight ? '#e0e0e0' : '#2a2e39' } }
            });
        }
    }
    
    function checkTheme() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') document.body.classList.add('light-mode');
    }
    
    // Auth functions
    function checkAuth() {
        const savedUser = localStorage.getItem('lunoUser') || sessionStorage.getItem('lunoUser');
        if (!savedUser) window.location.href = 'index.html';
        return savedUser ? JSON.parse(savedUser) : null;
    }
    
    function displayUsername() {
        const user = checkAuth();
        if (user) document.getElementById('displayUsername').innerText = user.fullName?.split(' ')[0] || user.email?.split('@')[0] || 'Trader';
    }
    
    function loadUserBalance() {
        const profile = JSON.parse(localStorage.getItem('lunoProfile') || '{"balance": 0}');
        userBalance = profile.balance;
    }
    
    function logout() {
        localStorage.removeItem('lunoUser');
        sessionStorage.removeItem('lunoUser');
        window.location.href = 'index.html';
    }
    
    // Event listeners
    document.querySelectorAll('.tf-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentTimeframe = this.getAttribute('data-timeframe');
            updateChart();
        });
    });
    
    document.getElementById('tradeAmount').addEventListener('input', updateTotal);
    
    // Initialize
    checkAuth();
    displayUsername();
    loadUserBalance();
    getSelectedCoin();
    initChart();
    fetchRealTimePrice();
    checkTheme();
    
    setInterval(fetchRealTimePrice, 15000);
    setInterval(() => updateOrderBook(currentPrice), 5000);
    setInterval(() => updateDepthChart(currentPrice), 5000);
</script>

</body>
</html>
