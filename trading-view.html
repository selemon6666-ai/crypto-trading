<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Trading View</title>
    <!-- Use CDN that definitely works -->
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #00d4ff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .username {
            color: #00d4ff;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-decoration: none;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.3);
        }

        .back-button {
            margin-top: 80px;
            padding: 10px 20px;
        }

        .back-btn {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            color: #00d4ff;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            background: rgba(0, 212, 255, 0.3);
        }

        .trading-container {
            padding: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .chart-section {
            flex: 3;
            min-width: 300px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .coin-info {
            display: flex;
            align-items: baseline;
            gap: 15px;
            flex-wrap: wrap;
        }

        .coin-symbol {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .coin-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #00ff88;
        }

        .price-change {
            font-size: 0.9rem;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .price-change.positive {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .price-change.negative {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }

        .timeframe-buttons {
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 12px;
        }

        .timeframe-btn {
            background: transparent;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .timeframe-btn:hover, .timeframe-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
        }

        #chart-container {
            width: 100%;
            height: 450px;
        }

        .right-panel {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stats-card, .trade-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats-title {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
        }

        .stat-value {
            font-weight: 600;
        }

        .trade-type {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .trade-type-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .trade-type-btn.buy {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .trade-type-btn.sell {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        .trade-type-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
            border: none;
        }

        .trade-input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            margin-bottom: 10px;
        }

        .trade-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .trade-btn.buy {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: white;
        }

        .trade-btn.sell {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            .trading-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">📈 Luno Trading</div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="markets.html">Markets</a>
        <a href="trade.html">Trades</a>
        <a href="profile.html">My Profile</a>
    </div>
    <div class="user-info">
        <span class="username" id="displayUsername">Trader</span>
        <a href="#" class="logout-btn" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="back-button">
    <a href="markets.html" class="back-btn">← Back to Markets</a>
</div>

<div class="trading-container">
    <div class="chart-section">
        <div class="chart-header">
            <div class="coin-info">
                <span class="coin-symbol" id="coinSymbol">BTC/USDT</span>
                <span class="coin-price" id="currentPrice">$0.00</span>
                <span class="price-change" id="priceChange">0.00%</span>
            </div>
            <div class="timeframe-buttons">
                <button class="timeframe-btn" data-days="1">1D</button>
                <button class="timeframe-btn active" data-days="7">7D</button>
                <button class="timeframe-btn" data-days="30">30D</button>
                <button class="timeframe-btn" data-days="365">1Y</button>
            </div>
        </div>
        <div id="chart-container"></div>
    </div>

    <div class="right-panel">
        <div class="stats-card">
            <div class="stats-title">Market Statistics</div>
            <div class="stat-row">
                <span class="stat-label">24h High</span>
                <span class="stat-value" id="high24h">$0.00</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">24h Low</span>
                <span class="stat-value" id="low24h">$0.00</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">24h Volume</span>
                <span class="stat-value" id="volume24h">$0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Market Cap</span>
                <span class="stat-value" id="marketCap">$0</span>
            </div>
        </div>

        <div class="trade-panel">
            <div class="trade-type">
                <button class="trade-type-btn buy active" onclick="setTradeType('buy')">BUY</button>
                <button class="trade-type-btn sell" onclick="setTradeType('sell')">SELL</button>
            </div>
            <input type="number" id="tradeAmount" class="trade-input" placeholder="Amount (USDT)" oninput="updateTotal()">
            <div class="stat-row">
                <span class="stat-label">Total:</span>
                <span class="stat-value" id="totalAmount">$0.00</span>
            </div>
            <button class="trade-btn buy" id="tradeActionBtn" onclick="executeTrade()">BUY</button>
        </div>
    </div>
</div>

<script>
    let chart = null;
    let lineSeries = null;
    let currentSymbol = 'BTC';
    let currentDays = 7;
    let tradeType = 'buy';
    let currentPrice = 0;
    
    // CoinGecko API mapping
    const coinGeckoIds = {
        'BTC': 'bitcoin',
        'ETH': 'ethereum',
        'SOL': 'solana',
        'DOGE': 'dogecoin',
        'BNB': 'binancecoin',
        'XRP': 'ripple',
        'ADA': 'cardano'
    };
    
    // Get selected coin
    function getSelectedCoin() {
        const params = new URLSearchParams(window.location.search);
        const symbol = params.get('symbol');
        if (symbol && coinGeckoIds[symbol.toUpperCase()]) {
            currentSymbol = symbol.toUpperCase();
        } else {
            const saved = localStorage.getItem('selectedCrypto');
            if (saved) {
                try {
                    const crypto = JSON.parse(saved);
                    currentSymbol = crypto.symbol;
                } catch(e) {}
            }
        }
        document.getElementById('coinSymbol').innerText = `${currentSymbol}/USDT`;
    }
    
    // Fetch current price
    async function fetchCurrentPrice() {
        const coinId = coinGeckoIds[currentSymbol];
        if (!coinId) return;
        
        try {
            const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coinId}&vs_currencies=usd&include_24hr_change=true&include_24hr_high_low=true&include_24hr_vol=true&include_market_cap=true`);
            const data = await response.json();
            const coinData = data[coinId];
            
            if (coinData) {
                currentPrice = coinData.usd;
                document.getElementById('currentPrice').innerText = `$${currentPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                document.getElementById('high24h').innerText = `$${(coinData.usd_24h_high || currentPrice).toLocaleString()}`;
                document.getElementById('low24h').innerText = `$${(coinData.usd_24h_low || currentPrice).toLocaleString()}`;
                document.getElementById('volume24h').innerText = `$${(coinData.usd_24h_vol || 0).toLocaleString()}`;
                document.getElementById('marketCap').innerText = `$${(coinData.usd_market_cap || 0).toLocaleString()}`;
                
                const change = coinData.usd_24h_change || 0;
                const changeElement = document.getElementById('priceChange');
                changeElement.innerText = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                changeElement.className = `price-change ${change >= 0 ? 'positive' : 'negative'}`;
            }
        } catch (error) {
            console.error('Error:', error);
        }
    }
    
    // Fetch historical data
    async function fetchHistoricalData() {
        const coinId = coinGeckoIds[currentSymbol];
        if (!coinId) return [];
        
        try {
            const response = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=${currentDays}`);
            const data = await response.json();
            
            if (!data.prices || data.prices.length === 0) return generateMockData();
            
            // Format for chart
            const chartData = data.prices.map(price => ({
                time: Math.floor(price[0] / 1000),
                value: price[1]
            }));
            
            return chartData;
        } catch (error) {
            console.error('Error fetching historical data:', error);
            return generateMockData();
        }
    }
    
    // Generate mock data if API fails
    function generateMockData() {
        const data = [];
        let price = currentPrice || 50000;
        const now = Math.floor(Date.now() / 1000);
        const points = currentDays === 1 ? 24 : currentDays === 7 ? 168 : currentDays === 30 ? 720 : 8760;
        
        for (let i = points; i >= 0; i--) {
            const change = (Math.random() - 0.5) * (price * 0.02);
            price = Math.max(price + change, 1000);
            data.push({
                time: now - (i * 3600),
                value: price
            });
        }
        return data;
    }
    
    // Initialize chart
    async function initChart() {
        const chartContainer = document.getElementById('chart-container');
        
        chart = LightweightCharts.createChart(chartContainer, {
            width: chartContainer.clientWidth,
            height: 450,
            layout: {
                backgroundColor: '#1a1a2e',
                textColor: '#ffffff',
            },
            grid: {
                vertLines: { color: '#2a2a4a' },
                horzLines: { color: '#2a2a4a' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
            rightPriceScale: {
                borderColor: '#2a2a4a',
            },
            timeScale: {
                borderColor: '#2a2a4a',
                timeVisible: true,
            },
        });
        
        lineSeries = chart.addLineSeries({
            color: '#00d4ff',
            lineWidth: 2,
            priceLineVisible: false,
        });
        
        const data = await fetchHistoricalData();
        lineSeries.setData(data);
        
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartContainer.clientWidth });
        });
    }
    
    // Update chart
    async function updateChart() {
        if (lineSeries) {
            const data = await fetchHistoricalData();
            lineSeries.setData(data);
        }
    }
    
    function updateTotal() {
        const amount = parseFloat(document.getElementById('tradeAmount').value) || 0;
        document.getElementById('totalAmount').innerText = `$${amount.toFixed(2)}`;
    }
    
    function setTradeType(type) {
        tradeType = type;
        const buyBtn = document.querySelector('.trade-type-btn.buy');
        const sellBtn = document.querySelector('.trade-type-btn.sell');
        const actionBtn = document.getElementById('tradeActionBtn');
        
        if (type === 'buy') {
            buyBtn.classList.add('active');
            sellBtn.classList.remove('active');
            actionBtn.className = 'trade-btn buy';
            actionBtn.innerText = 'BUY';
        } else {
            sellBtn.classList.add('active');
            buyBtn.classList.remove('active');
            actionBtn.className = 'trade-btn sell';
            actionBtn.innerText = 'SELL';
        }
    }
    
    function executeTrade() {
        const amount = parseFloat(document.getElementById('tradeAmount').value);
        if (!amount || amount <= 0) {
            alert('Please enter a valid amount');
            return;
        }
        
        alert(`✅ Paper Trade Executed!\n\nAction: ${tradeType.toUpperCase()}\nAmount: ${amount} USDT\nPrice: $${currentPrice.toFixed(2)}\nTotal: $${amount.toFixed(2)}\n\nThis is a simulated trade. No real money involved.`);
        
        document.getElementById('tradeAmount').value = '';
        updateTotal();
    }
    
    // Timeframe change
    async function changeTimeframe(days, btn) {
        currentDays = parseInt(days);
        document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        await updateChart();
    }
    
    // Display username
    function displayUsername() {
        const savedUser = localStorage.getItem('lunoUser') || sessionStorage.getItem('lunoUser');
        if (savedUser) {
            try {
                const user = JSON.parse(savedUser);
                document.getElementById('displayUsername').innerText = user.fullName?.split(' ')[0] || user.email?.split('@')[0] || 'Trader';
            } catch(e) {}
        }
    }
    
    function checkAuth() {
        const savedUser = localStorage.getItem('lunoUser') || sessionStorage.getItem('lunoUser');
        if (!savedUser) {
            window.location.href = 'index.html';
        }
    }
    
    function logout() {
        localStorage.removeItem('lunoUser');
        sessionStorage.removeItem('lunoUser');
        window.location.href = 'index.html';
    }
    
    // Event listeners
    document.querySelectorAll('.timeframe-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            changeTimeframe(btn.getAttribute('data-days'), btn);
        });
    });
    
    // Initialize everything
    checkAuth();
    displayUsername();
    getSelectedCoin();
    fetchCurrentPrice();
    initChart();
    
    // Update price every 30 seconds
    setInterval(fetchCurrentPrice, 30000);
    setInterval(updateChart, 60000);
</script>

</body>
</html>
