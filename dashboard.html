<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }
        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: -1; }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }
        .logo { font-size: 1.8rem; font-weight: bold; background: linear-gradient(135deg, #00d4ff, #7c3aed); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a { color: white; text-decoration: none; transition: 0.3s; font-weight: 500; font-size: 1rem; }
        .nav-links a:hover, .nav-links a.active { color: #00d4ff; }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .username { color: #00d4ff; font-weight: 500; }
        .logout-btn { background: rgba(255, 255, 255, 0.1); padding: 8px 24px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2); text-decoration: none; color: white; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .logout-btn:hover { background: rgba(255, 68, 68, 0.3); border-color: rgba(255, 68, 68, 0.5); }
        .main-content {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 20px 60px;
        }
        .badge { background: rgba(0, 212, 255, 0.15); display: inline-block; padding: 8px 24px; border-radius: 50px; font-size: 0.85rem; margin-bottom: 30px; border: 1px solid rgba(0, 212, 255, 0.3); backdrop-filter: blur(5px); }
        h1 { font-size: 5rem; margin-bottom: 20px; line-height: 1.2; font-weight: 700; }
        .gradient-text { background: linear-gradient(135deg, #00d4ff, #7c3aed); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .subtitle { font-size: 1.2rem; color: rgba(255, 255, 255, 0.8); margin-bottom: 40px; line-height: 1.6; max-width: 600px; }
        .start-btn { background: linear-gradient(135deg, #00d4ff, #7c3aed); border: none; padding: 14px 48px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; color: white; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; }
        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0, 212, 255, 0.3); }
        .stats-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1000px; width: 100%; margin-top: 60px; }
        .stat-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 16px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        .stat-card .stat-label { font-size: 0.8rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 8px; }
        .stat-card .stat-value { font-size: 1.3rem; font-weight: bold; color: #00ff88; }
        @media (max-width: 768px) {
            .navbar { padding: 15px 20px; flex-direction: column; gap: 15px; }
            .nav-links { gap: 20px; flex-wrap: wrap; justify-content: center; }
            h1 { font-size: 2.5rem; }
            .stats-container { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
    </style>
</head>
<body>
<canvas id="canvas-bg"></canvas>
<div class="overlay"></div>
<nav class="navbar">
    <div class="logo">📈 Luno Trading</div>
    <div class="nav-links">
        <a href="dashboard.html" class="active">Home</a>
        <a href="markets.html">Markets</a>
        <a href="trade.html">Trades</a>
        <a href="profile.html">My Profile</a>
    </div>
    <div class="user-info">
        <span class="username" id="displayUsername">Trader</span>
        <a href="#" class="logout-btn" onclick="logout()">Logout</a>
    </div>
</nav>
<div class="main-content">
    <div class="badge">⚡ Welcome to Luno Trading</div>
    <h1>Trade <span class="gradient-text">Smarter,</span><br>Trade Better</h1>
    <p class="subtitle">Empower your trading journey with real-time insights and expert analysis.</p>
    <button class="start-btn" onclick="goToTrade()">🚀 Start Trading</button>
    <div class="stats-container">
        <div class="stat-card"><div class="stat-label">Your Balance</div><div class="stat-value" id="balance">$10,000</div></div>
        <div class="stat-card"><div class="stat-label">Total Trades</div><div class="stat-value" id="totalTrades">0</div></div>
        <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-value" id="winRate">0%</div></div>
        <div class="stat-card"><div class="stat-label">Total Profit</div><div class="stat-value" id="totalProfit">$0</div></div>
    </div>
</div>
<script>
    // ========== USER SESSION MANAGEMENT ==========
    function getCurrentUser() {
        const session = localStorage.getItem('lunoSession') || sessionStorage.getItem('lunoSession');
        if (session) { try { return JSON.parse(session); } catch(e) {} }
        return null;
    }
    function getUserData(email) {
        const defaultData = { balance: 10000, tradeHistory: [], kycStatus: 'pending', phoneNumber: '' };
        const saved = localStorage.getItem(`luno_user_${email}`);
        if (saved) { try { return { ...defaultData, ...JSON.parse(saved) }; } catch(e) {} }
        return defaultData;
    }
    function checkAuth() {
        const user = getCurrentUser();
        if (!user) { window.location.href = 'index.html'; }
        return user;
    }
    function getCurrentUserName() { const user = getCurrentUser(); return user ? user.fullName : 'Trader'; }
    function getCurrentUserEmail() { const user = getCurrentUser(); return user ? user.email : null; }
    function logout() { localStorage.removeItem('lunoSession'); sessionStorage.removeItem('lunoSession'); window.location.href = 'index.html'; }
    function goToTrade() { window.location.href = 'trade.html'; }
    
    // ========== CANVAS BACKGROUND ==========
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [], candlesticks = [], time = 0;
    function resizeCanvas() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    class DataParticle {
        constructor() {
            this.x = Math.random() * width; this.y = Math.random() * height;
            this.size = Math.random() * 3 + 1; this.speedY = Math.random() * 2 + 0.5;
            this.opacity = Math.random() * 0.5 + 0.2;
            this.char = Math.random() > 0.7 ? ['$', '€', '£', '¥', '₿', '📈', '📉', '%'][Math.floor(Math.random() * 8)] : '';
        }
        update() { this.y += this.speedY; if (this.y > height) { this.y = 0; this.x = Math.random() * width; } }
        draw() {
            if (this.char) {
                ctx.font = `${this.size * 8}px monospace`;
                ctx.fillStyle = `rgba(0, 212, 255, ${this.opacity})`;
                ctx.fillText(this.char, this.x, this.y);
            } else {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(124, 58, 237, ${this.opacity})`; ctx.fill();
            }
        }
    }
    class BGCandle {
        constructor(x, h) { this.x = x; this.height = h; this.width = 30; this.speed = 0.5; }
        update() { this.x -= this.speed; }
        draw() {
            const isGreen = Math.random() > 0.5;
            ctx.fillStyle = isGreen ? 'rgba(0, 255, 136, 0.15)' : 'rgba(255, 68, 68, 0.15)';
            ctx.fillRect(this.x, height - this.height, this.width, this.height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fillRect(this.x + this.width/2 - 2, height - this.height - 20, 4, 20);
        }
    }
    function initBackground() {
        for (let i = 0; i < 100; i++) particles.push(new DataParticle());
        for (let i = 0; i < 20; i++) candlesticks.push(new BGCandle(width + i * 50, Math.random() * 200 + 50));
    }
    function animateBackground() {
        ctx.clearRect(0, 0, width, height);
        const gradient = ctx.createLinearGradient(0, 0, width, height);
        gradient.addColorStop(0, '#0f0c29'); gradient.addColorStop(0.5, '#302b63'); gradient.addColorStop(1, '#24243e');
        ctx.fillStyle = gradient; ctx.fillRect(0, 0, width, height);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)'; ctx.lineWidth = 1;
        for (let i = 0; i < 10; i++) { ctx.beginPath(); ctx.moveTo(0, height / 10 * i); ctx.lineTo(width, height / 10 * i); ctx.stroke(); }
        for (let i = candlesticks.length - 1; i >= 0; i--) { candlesticks[i].update(); candlesticks[i].draw(); if (candlesticks[i].x + candlesticks[i].width < 0) candlesticks.splice(i, 1); }
        if (Math.random() < 0.05) candlesticks.push(new BGCandle(width, Math.random() * 250 + 50));
        for (let particle of particles) { particle.update(); particle.draw(); }
        time++;
        if (time % 30 === 0) {
            ctx.font = 'bold 14px monospace'; ctx.fillStyle = 'rgba(0, 212, 255, 0.3)';
            for (let i = 0; i < 5; i++) { const price = (Math.random() * 50000 + 10000).toFixed(2); ctx.fillText(`$${price}`, Math.random() * width, Math.random() * height); }
        }
        requestAnimationFrame(animateBackground);
    }
    
    // ========== LOAD USER DATA ==========
    function loadDashboard() {
        const user = checkAuth();
        const email = user.email;
        const userData = getUserData(email);
        document.getElementById('displayUsername').innerText = user.fullName.split(' ')[0];
        document.getElementById('balance').innerText = `$${userData.balance.toFixed(2)}`;
        const completedTrades = userData.tradeHistory.filter(t => t.status === 'won' || t.status === 'lost');
        const totalTrades = completedTrades.length;
        const winningTrades = userData.tradeHistory.filter(t => t.status === 'won').length;
        const totalProfit = userData.tradeHistory.reduce((sum, t) => sum + (t.profit || 0), 0);
        document.getElementById('totalTrades').innerText = totalTrades;
        document.getElementById('winRate').innerText = totalTrades > 0 ? ((winningTrades / totalTrades) * 100).toFixed(1) + '%' : '0%';
        document.getElementById('totalProfit').innerText = `$${totalProfit.toFixed(2)}`;
        document.getElementById('totalProfit').style.color = totalProfit >= 0 ? '#00ff88' : '#ff4444';
    }
    
    window.addEventListener('resize', () => { resizeCanvas(); particles = []; initBackground(); });
    resizeCanvas(); initBackground(); animateBackground();
    loadDashboard();
</script>
</body>
</html>
