<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Trade (Test)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #131722;
            color: #d1d4dc;
            padding: 20px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 40px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #d1d4dc;
            text-decoration: none;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logout-btn {
            background: rgba(255, 68, 68, 0.15);
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            color: #ff4444;
        }

        .main-content {
            margin-top: 80px;
            padding: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .trade-card {
            background: #1e222d;
            border-radius: 12px;
            border: 1px solid #2a2e39;
            overflow: hidden;
            padding: 20px;
        }

        .card-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .card-header h1 {
            font-size: 1.5rem;
            color: white;
        }

        .trade-type {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .trade-type-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
        }

        .trade-type-btn.buy { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .trade-type-btn.sell { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
        .trade-type-btn.active { background: linear-gradient(135deg, #00d4ff, #7c3aed); color: white; }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #787b86;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: #2a2e39;
            border: 1px solid #3a3e49;
            border-radius: 8px;
            color: white;
        }

        .return-options {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .return-option {
            background: #2a2e39;
            border: 1px solid #3a3e49;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }

        .return-option.selected {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
        }

        .btn-confirm {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn-cancel {
            width: 100%;
            padding: 12px;
            background: #2a2e39;
            border: 1px solid #3a3e49;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2e39;
        }

        .test-result {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">📈 Luno Trading</div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="markets.html">Markets</a>
        <a href="trade.html" style="color: #00d4ff;">Trades</a>
        <a href="profile.html">My Profile</a>
    </div>
    <div class="user-info">
        <span class="username">Trader</span>
        <a href="#" class="logout-btn" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="main-content">
    <div class="trade-card">
        <div class="card-header">
            <h1>Test Trade Interface</h1>
            <p>Click buttons to test if they work</p>
        </div>

        <div class="trade-type">
            <div class="trade-type-btn buy active" onclick="testBuy()">BUY</div>
            <div class="trade-type-btn sell" onclick="testSell()">SELL</div>
        </div>

        <div class="form-group">
            <label>Select Crypto</label>
            <select id="cryptoSelect" onchange="updateCrypto()">
                <option value="BTC">Bitcoin (BTC)</option>
                <option value="ETH">Ethereum (ETH)</option>
                <option value="SOL">Solana (SOL)</option>
                <option value="DOGE">Dogecoin (DOGE)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Amount (USDT)</label>
            <input type="number" id="amount" placeholder="Enter amount">
        </div>

        <label>Select Duration</label>
        <div class="return-options">
            <div class="return-option" data-time="30" data-rate="12" onclick="testDuration(30, 12, 100)">
                30s<br>+12%
            </div>
            <div class="return-option" data-time="60" data-rate="18" onclick="testDuration(60, 18, 15000)">
                60s<br>+18%
            </div>
            <div class="return-option" data-time="90" data-rate="25" onclick="testDuration(90, 25, 60000)">
                90s<br>+25%
            </div>
            <div class="return-option" data-time="180" data-rate="32" onclick="testDuration(180, 32, 200000)">
                180s<br>+32%
            </div>
            <div class="return-option" data-time="300" data-rate="45" onclick="testDuration(300, 45, 900000)">
                300s<br>+45%
            </div>
        </div>

        <div class="info-row">
            <span>Available Amount:</span>
            <span id="availableAmount">10,000 USDT</span>
        </div>
        <div class="info-row">
            <span>Selected Duration:</span>
            <span id="selectedDurationText">None</span>
        </div>
        <div class="info-row">
            <span>Expected Return:</span>
            <span id="expectedReturn">0.00 USDT</span>
        </div>

        <button class="btn-confirm" onclick="testConfirm()">CONFIRM TRADE</button>
        <button class="btn-cancel" onclick="testCancel()">Cancel</button>

        <div class="test-result" id="testResult">
            Click buttons to test functionality
        </div>
    </div>
</div>

<script>
    let currentTradeType = 'buy';
    let selectedDurationSec = null;
    let selectedRateVal = 0;
    let selectedMinAmt = 0;
    let currentCrypto = 'BTC';

    function testBuy() {
        currentTradeType = 'buy';
        document.querySelector('.trade-type-btn.buy').classList.add('active');
        document.querySelector('.trade-type-btn.sell').classList.remove('active');
        document.getElementById('testResult').innerHTML = '✅ BUY mode selected';
        document.getElementById('testResult').style.color = '#00ff88';
    }

    function testSell() {
        currentTradeType = 'sell';
        document.querySelector('.trade-type-btn.sell').classList.add('active');
        document.querySelector('.trade-type-btn.buy').classList.remove('active');
        document.getElementById('testResult').innerHTML = '✅ SELL mode selected';
        document.getElementById('testResult').style.color = '#00ff88';
    }

    function updateCrypto() {
        const select = document.getElementById('cryptoSelect');
        currentCrypto = select.value;
        document.getElementById('testResult').innerHTML = `✅ Selected crypto: ${currentCrypto}`;
        document.getElementById('testResult').style.color = '#00d4ff';
    }

    function testDuration(seconds, rate, minAmount) {
        selectedDurationSec = seconds;
        selectedRateVal = rate;
        selectedMinAmt = minAmount;
        
        // Update UI
        document.querySelectorAll('.return-option').forEach(opt => opt.classList.remove('selected'));
        event.target.closest('.return-option').classList.add('selected');
        
        document.getElementById('selectedDurationText').innerHTML = `${seconds}s (+${rate}%)`;
        document.getElementById('testResult').innerHTML = `✅ Duration selected: ${seconds}s with +${rate}% return`;
        document.getElementById('testResult').style.color = '#00ff88';
        
        // Calculate return
        calculateReturnPreview();
    }

    function calculateReturnPreview() {
        const amount = parseFloat(document.getElementById('amount').value);
        if (isNaN(amount) || amount <= 0 || !selectedDurationSec) {
            return;
        }
        
        if (amount < selectedMinAmt) {
            document.getElementById('expectedReturn').innerHTML = `Need min $${selectedMinAmt.toLocaleString()}`;
            document.getElementById('expectedReturn').style.color = '#ff4444';
            return;
        }
        
        const expectedReturnAmount = amount * (selectedRateVal / 100);
        document.getElementById('expectedReturn').innerHTML = `+${expectedReturnAmount.toFixed(2)} USDT`;
        document.getElementById('expectedReturn').style.color = '#00ff88';
    }

    function testConfirm() {
        const amount = parseFloat(document.getElementById('amount').value);
        
        if (isNaN(amount) || amount <= 0) {
            document.getElementById('testResult').innerHTML = '❌ Please enter a valid amount';
            document.getElementById('testResult').style.color = '#ff4444';
            return;
        }
        
        if (!selectedDurationSec) {
            document.getElementById('testResult').innerHTML = '❌ Please select a duration first';
            document.getElementById('testResult').style.color = '#ff4444';
            return;
        }
        
        if (amount < selectedMinAmt) {
            document.getElementById('testResult').innerHTML = `❌ Minimum amount for ${selectedDurationSec}s is $${selectedMinAmt.toLocaleString()} USDT`;
            document.getElementById('testResult').style.color = '#ff4444';
            return;
        }
        
        const expectedReturn = amount * (selectedRateVal / 100);
        document.getElementById('testResult').innerHTML = `✅ TRADE CONFIRMED!\n\nType: ${currentTradeType.toUpperCase()}\nCrypto: ${currentCrypto}\nAmount: $${amount} USDT\nDuration: ${selectedDurationSec}s\nExpected Return: +${expectedReturn.toFixed(2)} USDT\n\nThis is a TEST - No actual trade was placed.`;
        document.getElementById('testResult').style.color = '#00ff88';
    }

    function testCancel() {
        document.getElementById('amount').value = '';
        selectedDurationSec = null;
        selectedRateVal = 0;
        selectedMinAmt = 0;
        document.querySelectorAll('.return-option').forEach(opt => opt.classList.remove('selected'));
        document.getElementById('selectedDurationText').innerHTML = 'None';
        document.getElementById('expectedReturn').innerHTML = '0.00 USDT';
        document.getElementById('testResult').innerHTML = '🔄 Trade cancelled. Form reset.';
        document.getElementById('testResult').style.color = '#ffaa00';
    }

    function logout() {
        window.location.href = 'index.html';
    }

    // Add amount input listener
    document.getElementById('amount').addEventListener('input', function() {
        calculateReturnPreview();
    });
</script>

</body>
</html>
