<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Trading View</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #131722;
            color: #d1d4dc;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 40px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #d1d4dc;
            text-decoration: none;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .nav-links a:hover {
            color: #00d4ff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .username {
            color: #00d4ff;
        }

        .logout-btn {
            background: rgba(255, 68, 68, 0.15);
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid rgba(255, 68, 68, 0.3);
            cursor: pointer;
            color: #ff4444;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.3);
        }

        .back-button {
            margin: 65px 20px 0 20px;
        }

        .back-btn {
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            color: #00d4ff;
            text-decoration: none;
            display: inline-block;
            font-size: 0.8rem;
        }

        .trading-container {
            padding: 15px 20px;
            display: flex;
            gap: 20px;
            min-height: calc(100vh - 60px);
        }

        .chart-panel {
            flex: 3;
            background: #1e222d;
            border-radius: 12px;
            border: 1px solid #2a2e39;
            padding: 15px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .symbol-info {
            display: flex;
            align-items: baseline;
            gap: 15px;
            flex-wrap: wrap;
        }

        .symbol {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
        }

        .price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff88;
        }

        .change {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 16px;
        }

        .change.positive {
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
        }

        .change.negative {
            background: rgba(255, 68, 68, 0.15);
            color: #ff4444;
        }

        .timeframes {
            display: flex;
            gap: 5px;
            background: #2a2e39;
            padding: 4px;
            border-radius: 8px;
        }

        .tf-btn {
            background: transparent;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            color: #d1d4dc;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
        }

        .tf-btn:hover, .tf-btn.active {
            background: #00d4ff;
            color: #131722;
        }

        #chart-container {
            width: 100%;
            height: 480px;
        }

        .info-panel {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stats-card, .trade-card {
            background: #1e222d;
            border-radius: 12px;
            border: 1px solid #2a2e39;
            padding: 15px;
        }

        .card-title {
            font-size: 0.7rem;
            color: #787b86;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.8rem;
            border-bottom: 1px solid #2a2e39;
        }

        .trade-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .trade-tab.buy {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .trade-tab.sell {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.2);
        }

        .trade-tab.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
            border: none;
        }

        .trade-input {
            width: 100%;
            padding: 10px;
            background: #2a2e39;
            border: 1px solid #3a3e49;
            border-radius: 6px;
            color: white;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .perc-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .perc-btn {
            flex: 1;
            padding: 5px;
            background: #2a2e39;
            border: none;
            border-radius: 4px;
            color: #d1d4dc;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .trade-action-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .trade-action-btn.buy {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: white;
        }

        .trade-action-btn.sell {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
        }

        @media (max-width: 900px) {
            .trading-container { flex-direction: column; }
            .info-panel { width: 100%; }
            .navbar { padding: 10px 20px; flex-direction: column; gap: 8px; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">📈 Luno Trading</div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="markets.html">Markets</a>
        <a href="trade.html">Trades</a>
        <a href="profile.html">Profile</a>
    </div>
    <div class="user-info">
        <span class="username" id="displayUsername">Trader</span>
        <a href="#" class="logout-btn" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="back-button">
    <a href="markets.html" class="back-btn">← Back to Markets</a>
</div>

<div class="trading-container">
    <div class="chart-panel">
        <div class="chart-header">
            <div class="symbol-info">
                <span class="symbol" id="coinSymbol">BTC/USDT</span>
                <span class="price" id="currentPrice">$0.00</span>
                <span class="change" id="priceChange">0.00%</span>
            </div>
            <div class="timeframes">
                <button class="tf-btn" data-timeframe="1">1H</button>
                <button class="tf-btn active" data-timeframe="24">24H</button>
                <button class="tf-btn" data-timeframe="7">7D</button>
                <button class="tf-btn" data-timeframe="30">30D</button>
            </div>
        </div>
        <div id="chart-container"></div>
    </div>

    <div class="info-panel">
        <div class="stats-card">
            <div class="card-title">Market Statistics</div>
            <div class="stat-row"><span>24h High</span><span id="high24h">$0.00</span></div>
            <div class="stat-row"><span>24h Low</span><span id="low24h">$0.00</span></div>
            <div class="stat-row"><span>24h Volume</span><span id="volume24h">$0</span></div>
            <div class="stat-row"><span>Market Cap</span><span id="marketCap">$0</span></div>
        </div>

        <div class="trade-card">
            <div class="trade-tabs">
                <div class="trade-tab buy active" onclick="setTradeType('buy')">BUY</div>
                <div class="trade-tab sell" onclick="setTradeType('sell')">SELL</div>
            </div>
            <input type="number" id="tradeAmount" class="trade-input" placeholder="Amount (USDT)" oninput="updateTotal()">
            <div class="perc-buttons">
                <button class="perc-btn" onclick="setPercentage(25)">25%</button>
                <button class="perc-btn" onclick="setPercentage(50)">50%</button>
                <button class="perc-btn" onclick="setPercentage(75)">75%</button>
                <button class="perc-btn" onclick="setPercentage(100)">100%</button>
            </div>
            <div class="stat-row" style="margin-top: 5px;">
                <span>Total:</span>
                <span id="totalAmount">$0.00</span>
            </div>
            <button class="trade-action-btn buy" id="tradeActionBtn" onclick="executeTrade()">BUY</button>
        </div>
    </div>
</div>

<script>
    let chart = null;
    let lineSeries = null;
    let currentSymbol = 'BTC';
    let currentTimeframe = '24';
    let tradeType = 'buy';
    let currentPrice = 0;
    let userBalance = 0;
    
    // Pre-generated chart data for instant display (no waiting!)
    const chartDataCache = {
        '1': null,
        '24': null,
        '7': null,
        '30': null
    };
    
    const coinNames = {
        'BTC': 'Bitcoin', 'ETH': 'Ethereum', 'SOL': 'Solana', 'DOGE': 'Dogecoin',
        'BNB': 'Binance Coin', 'XRP': 'XRP', 'ADA': 'Cardano', 'AVAX': 'Avalanche'
    };
    
    // Fallback prices for instant display
    const fallbackPrices = {
        'BTC': 65234.50, 'ETH': 3420.75, 'SOL': 145.30, 'DOGE': 0.124,
        'BNB': 580.20, 'XRP': 0.62, 'ADA': 0.48, 'AVAX': 38.75
    };
    
    function getSelectedCoin() {
        const params = new URLSearchParams(window.location.search);
        const symbol = params.get('symbol');
        if (symbol) currentSymbol = symbol;
        else {
            const saved = localStorage.getItem('selectedCrypto');
            if (saved) {
                try {
                    const crypto = JSON.parse(saved);
                    currentSymbol = crypto.symbol;
                } catch(e) {}
            }
        }
        document.getElementById('coinSymbol').innerText = `${currentSymbol}/USDT`;
    }
    
    // Generate chart data INSTANTLY (no API call)
    function generateChartData(timeframe, basePrice) {
        const data = [];
        const now = Math.floor(Date.now() / 1000);
        let points = 0;
        let interval = 3600;
        
        switch(timeframe) {
            case '1': points = 24; interval = 3600; break;
            case '24': points = 48; interval = 3600; break;
            case '7': points = 168; interval = 3600; break;
            case '30': points = 720; interval = 3600; break;
            default: points = 48; interval = 3600;
        }
        
        let price = basePrice;
        for (let i = points; i >= 0; i--) {
            const change = (Math.random() - 0.5) * (basePrice * 0.008);
            price += change;
            if (price < basePrice * 0.85) price = basePrice * 0.85;
            if (price > basePrice * 1.15) price = basePrice * 1.15;
            data.push({
                time: now - (i * interval),
                value: price
            });
        }
        return data;
    }
    
    // Get cached or generate new chart data
    function getChartData(timeframe) {
        const basePrice = fallbackPrices[currentSymbol] || 50000;
        if (!chartDataCache[timeframe]) {
            chartDataCache[timeframe] = generateChartData(timeframe, basePrice);
        }
        return chartDataCache[timeframe];
    }
    
    // Update chart INSTANTLY when timeframe changes
    function updateChartTimeframe(timeframe) {
        currentTimeframe = timeframe;
        const chartData = getChartData(timeframe);
        if (lineSeries) {
            lineSeries.setData(chartData);
        }
    }
    
    async function initChart() {
        const container = document.getElementById('chart-container');
        
        chart = LightweightCharts.createChart(container, {
            width: container.clientWidth,
            height: 480,
            layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } },
            rightPriceScale: { borderColor: '#2a2e39' },
            timeScale: { borderColor: '#2a2e39', timeVisible: true, secondsVisible: false },
        });
        
        lineSeries = chart.addLineSeries({ color: '#00d4ff', lineWidth: 2 });
        
        // Show chart INSTANTLY (no waiting for API)
        const initialData = getChartData(currentTimeframe);
        lineSeries.setData(initialData);
        
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: container.clientWidth });
        });
    }
    
    async function fetchRealTimePrice() {
        // Show fallback price instantly
        if (fallbackPrices[currentSymbol]) {
            currentPrice = fallbackPrices[currentSymbol];
            document.getElementById('currentPrice').innerText = `$${currentPrice.toLocaleString()}`;
            document.getElementById('high24h').innerText = `$${(currentPrice * 1.02).toLocaleString()}`;
            document.getElementById('low24h').innerText = `$${(currentPrice * 0.98).toLocaleString()}`;
        }
        
        // Try to fetch real price in background
        try {
            const coinId = currentSymbol.toLowerCase();
            const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coinId}&vs_currencies=usd&include_24hr_change=true`);
            if (response.ok) {
                const data = await response.json();
                if (data[coinId]) {
                    currentPrice = data[coinId].usd;
                    const change = data[coinId].usd_24h_change || 0;
                    document.getElementById('currentPrice').innerText = `$${currentPrice.toLocaleString()}`;
                    const changeElem = document.getElementById('priceChange');
                    changeElem.innerText = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                    changeElem.className = `change ${change >= 0 ? 'positive' : 'negative'}`;
                }
            }
        } catch(e) { console.log('Background fetch failed'); }
    }
    
    function updateTotal() {
        const amount = parseFloat(document.getElementById('tradeAmount').value) || 0;
        document.getElementById('totalAmount').innerText = `$${amount.toFixed(2)}`;
    }
    
    function setPercentage(percent) {
        const amount = (userBalance * percent / 100).toFixed(2);
        document.getElementById('tradeAmount').value = amount;
        updateTotal();
    }
    
    function setTradeType(type) {
        tradeType = type;
        const buyTab = document.querySelector('.trade-tab.buy');
        const sellTab = document.querySelector('.trade-tab.sell');
        const actionBtn = document.getElementById('tradeActionBtn');
        
        if (type === 'buy') {
            buyTab.classList.add('active');
            sellTab.classList.remove('active');
            actionBtn.className = 'trade-action-btn buy';
            actionBtn.innerText = 'BUY';
        } else {
            sellTab.classList.add('active');
            buyTab.classList.remove('active');
            actionBtn.className = 'trade-action-btn sell';
            actionBtn.innerText = 'SELL';
        }
    }
    
    function executeTrade() {
        const amount = parseFloat(document.getElementById('tradeAmount').value);
        if (!amount || amount <= 0) {
            alert('Please enter a valid amount');
            return;
        }
        if (amount > userBalance && tradeType === 'buy') {
            alert(`Insufficient balance! You have $${userBalance.toFixed(2)} USDT`);
            return;
        }
        alert(`${tradeType.toUpperCase()} order placed!\n\nAmount: ${amount} USDT\nPrice: $${currentPrice.toFixed(2)}`);
        if (tradeType === 'buy') {
            userBalance -= amount;
            const profile = JSON.parse(localStorage.getItem('lunoProfile') || '{"balance": 0}');
            profile.balance = userBalance;
            localStorage.setItem('lunoProfile', JSON.stringify(profile));
        }
        document.getElementById('tradeAmount').value = '';
        updateTotal();
    }
    
    function checkAuth() {
        const savedUser = localStorage.getItem('lunoUser') || sessionStorage.getItem('lunoUser');
        if (!savedUser) window.location.href = 'index.html';
        return savedUser ? JSON.parse(savedUser) : null;
    }
    
    function displayUsername() {
        const user = checkAuth();
        if (user) document.getElementById('displayUsername').innerText = user.fullName?.split(' ')[0] || user.email?.split('@')[0] || 'Trader';
    }
    
    function loadUserBalance() {
        const profile = JSON.parse(localStorage.getItem('lunoProfile') || '{"balance": 0}');
        userBalance = profile.balance;
    }
    
    function logout() {
        localStorage.removeItem('lunoUser');
        sessionStorage.removeItem('lunoUser');
        window.location.href = 'index.html';
    }
    
    // Setup timeframe buttons with INSTANT update
    document.querySelectorAll('.tf-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const timeframe = btn.getAttribute('data-timeframe');
            updateChartTimeframe(timeframe);
        });
    });
    
    document.getElementById('tradeAmount').addEventListener('input', updateTotal);
    
    // Initialize everything
    checkAuth();
    displayUsername();
    loadUserBalance();
    getSelectedCoin();
    initChart();
    fetchRealTimePrice();
    
    // Update price in background every 15 seconds
    setInterval(fetchRealTimePrice, 15000);
</script>

</body>
</html>
