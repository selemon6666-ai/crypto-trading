<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #131722;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .container {
            display: flex;
            width: 1100px;
            max-width: 90%;
            background: #1e222d;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2a2e39;
            z-index: 1;
            position: relative;
        }

        .form-section {
            flex: 1;
            padding: 50px 40px;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #787b86;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #787b86;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #2a2e39;
            border: 1px solid #3a3e49;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2);
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
            margin-top: 10px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #787b86;
        }

        .login-link a {
            color: #00d4ff;
            text-decoration: none;
        }

        .brand-section {
            flex: 1;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05), rgba(124, 58, 237, 0.05));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px;
            text-align: center;
        }

        .brand-icon { font-size: 5rem; margin-bottom: 20px; }
        .brand-section h2 { color: white; font-size: 2rem; }
        .brand-section p { color: #787b86; }

        .error-msg, .success-msg {
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            display: none;
        }

        .error-msg {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }

        .success-msg {
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        @media (max-width: 768px) { .brand-section { display: none; } }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
    <div class="form-section">
        <div class="logo">📈 Luno Trading</div>
        <h1>Register</h1>
        <p class="subtitle">Create your account to start trading</p>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <form id="registerForm" onsubmit="return handleRegister(event)">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your Full Name" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="register-btn">Register</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="index.html">Login</a>
        </div>
    </div>

    <div class="brand-section">
        <div class="brand-icon">📊</div>
        <h2>Your Trusted<br>Trading Platform</h2>
        <p>Trade smarter with real-time insights, advanced charts, and professional tools.</p>
    </div>
</div>

<script>
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.width = (Math.random() * 5 + 2) + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 15 + 10 + 's';
            particle.style.animationDelay = Math.random() * 10 + 's';
            container.appendChild(particle);
        }
    }

    function handleRegister(event) {
        event.preventDefault();
        
        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (password !== confirmPassword) {
            document.getElementById('errorMsg').innerHTML = '❌ Passwords do not match!';
            document.getElementById('errorMsg').style.display = 'block';
            return false;
        }
        
        if (password.length < 4) {
            document.getElementById('errorMsg').innerHTML = '❌ Password must be at least 4 characters!';
            document.getElementById('errorMsg').style.display = 'block';
            return false;
        }
        
        const userData = {
            fullName: fullName,
            email: email,
            password: password,
            balance: 0,
            registeredAt: new Date().toISOString()
        };
        
        localStorage.setItem('lunoRegisteredUser', JSON.stringify(userData));
        localStorage.setItem('lunoProfile', JSON.stringify({ balance: 0, kycStatus: 'pending' }));
        
        document.getElementById('successMsg').innerHTML = '✅ Account created successfully! Redirecting to login...';
        document.getElementById('successMsg').style.display = 'block';
        
        setTimeout(() => window.location.href = 'index.html', 2000);
        return false;
    }
    
    createParticles();
</script>

</body>
</html>
