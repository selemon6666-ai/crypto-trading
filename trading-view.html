<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Advanced Trading View</title>
    <!-- Lightweight Charts Library -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .nav-links a:hover {
            color: #00d4ff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username {
            color: #00d4ff;
            font-size: 0.9rem;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-decoration: none;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.3);
        }

        /* Back Button */
        .back-button {
            margin: 70px 20px 0 20px;
        }

        .back-btn {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            color: #00d4ff;
            text-decoration: none;
            display: inline-block;
            font-size: 0.8rem;
        }

        .back-btn:hover {
            background: rgba(0, 212, 255, 0.3);
        }

        /* Main Trading Layout */
        .trading-layout {
            display: flex;
            padding: 15px 20px;
            gap: 20px;
            min-height: calc(100vh - 60px);
        }

        /* Chart Area */
        .chart-area {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Chart Header */
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .coin-title {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        .coin-symbol {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .current-price {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00ff88;
        }

        .price-change {
            font-size: 0.9rem;
            padding: 3px 8px;
            border-radius: 16px;
        }

        .price-change.positive {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .price-change.negative {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }

        /* Timeframes */
        .timeframes {
            display: flex;
            gap: 5px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px;
            border-radius: 10px;
        }

        .tf-btn {
            background: transparent;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.75rem;
        }

        .tf-btn:hover, .tf-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
        }

        /* Chart Container */
        #chart-container {
            width: 100%;
            height: 500px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        /* Right Sidebar */
        .trading-sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Market Stats */
        .stats-widget {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .widget-title {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }

        .stat-value {
            font-weight: 600;
            font-size: 0.85rem;
        }

        /* Trade Panel */
        .trade-widget {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .trade-type {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .trade-type-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .trade-type-btn.buy {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .trade-type-btn.sell {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        .trade-type-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
            border: none;
        }

        .trade-input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .trade-input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            margin-top: 5px;
        }

        .total-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }

        .total-value {
            font-weight: bold;
            color: #00ff88;
        }

        .trade-action-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .trade-action-btn.buy {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: white;
        }

        .trade-action-btn.sell {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
        }

        /* Current Time Display */
        .current-time {
            margin-top: 10px;
            text-align: right;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 8px;
        }

        @media (max-width: 900px) {
            .trading-layout {
                flex-direction: column;
            }
            .trading-sidebar {
                width: 100%;
            }
            .navbar {
                padding: 10px 20px;
                flex-direction: column;
                gap: 10px;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">📈 Luno Trading</div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="markets.html">Markets</a>
        <a href="trade.html">Trades</a>
        <a href="profile.html">My Profile</a>
    </div>
    <div class="user-info">
        <span class="username" id="displayUsername">Trader</span>
        <a href="#" class="logout-btn" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="back-button">
    <a href="markets.html" class="back-btn">← Back to Markets</a>
</div>

<div class="trading-layout">
    <!-- Chart Area -->
    <div class="chart-area">
        <div class="chart-header">
            <div class="coin-title">
                <span class="coin-symbol" id="coinSymbol">BTC/USDT</span>
                <span class="current-price" id="currentPrice">$0.00</span>
                <span class="price-change" id="priceChange">0.00%</span>
            </div>
            <div class="timeframes">
                <button class="tf-btn" data-timeframe="1">1H</button>
                <button class="tf-btn active" data-timeframe="24">24H</button>
                <button class="tf-btn" data-timeframe="7">7D</button>
                <button class="tf-btn" data-timeframe="30">30D</button>
            </div>
        </div>
        <div id="chart-container"></div>
        <div class="current-time" id="currentTimeDisplay"></div>
    </div>

    <!-- Right Sidebar -->
    <div class="trading-sidebar">
        <!-- Market Stats -->
        <div class="stats-widget">
            <div class="widget-title">MARKET STATISTICS</div>
            <div class="stat-item">
                <span class="stat-label">24h High</span>
                <span class="stat-value" id="high24h">$0.00</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">24h Low</span>
                <span class="stat-value" id="low24h">$0.00</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">24h Volume</span>
                <span class="stat-value" id="volume24h">$0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Market Cap</span>
                <span class="stat-value" id="marketCap">$0</span>
            </div>
        </div>

        <!-- Trade Panel -->
        <div class="trade-widget">
            <div class="trade-type">
                <button class="trade-type-btn buy active" onclick="setTradeType('buy')">BUY</button>
                <button class="trade-type-btn sell" onclick="setTradeType('sell')">SELL</button>
            </div>
            <input type="number" id="tradeAmount" class="trade-input" placeholder="Amount (USDT)" oninput="updateTotal()">
            <div class="total-row">
                <span class="total-label">Total:</span>
                <span class="total-value" id="totalAmount">$0.00</span>
            </div>
            <button class="trade-action-btn buy" id="tradeActionBtn" onclick="executeTrade()">BUY</button>
        </div>
    </div>
</div>

<script>
    let chart = null;
    let candleSeries = null;
    let currentSymbol = 'BTC';
    let currentTimeframe = '24';
    let tradeType = 'buy';
    let currentPrice = 0;
    
    // CoinGecko API mapping
    const coinGeckoIds = {
        'BTC': 'bitcoin',
        'ETH': 'ethereum',
        'SOL': 'solana',
        'DOGE': 'dogecoin',
        'BNB': 'binancecoin',
        'XRP': 'ripple',
        'ADA': 'cardano',
        'AVAX': 'avalanche-2'
    };
    
    // Update current time display
    function updateCurrentTime() {
        const now = new Date();
        const formattedTime = now.toLocaleString('en-GB', {
            day: '2-digit',
            month: 'short',
            year: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        }).replace(',', '');
        document.getElementById('currentTimeDisplay').innerHTML = `📅 ${formattedTime}`;
    }
    
    // Get selected coin from URL
    function getSelectedCoin() {
        const params = new URLSearchParams(window.location.search);
        const symbol = params.get('symbol');
        if (symbol && coinGeckoIds[symbol]) {
            currentSymbol = symbol;
        } else {
            const saved = localStorage.getItem('selectedCrypto');
            if (saved) {
                try {
                    const crypto = JSON.parse(saved);
                    currentSymbol = crypto.symbol;
                } catch(e) {}
            }
        }
        document.getElementById('coinSymbol').innerText = `${currentSymbol}/USDT`;
    }
    
    // Fetch real-time price
    async function fetchRealTimePrice() {
        const coinId = coinGeckoIds[currentSymbol];
        if (!coinId) return;
        
        try {
            const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coinId}&vs_currencies=usd&include_24hr_change=true&include_24hr_high_low=true&include_24hr_vol=true&include_market_cap=true`);
            const data = await response.json();
            const coinData = data[coinId];
            
            if (coinData) {
                currentPrice = coinData.usd;
                document.getElementById('currentPrice').innerText = `$${currentPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                
                const change = coinData.usd_24h_change || 0;
                const changeElement = document.getElementById('priceChange');
                changeElement.innerText = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                changeElement.className = `price-change ${change >= 0 ? 'positive' : 'negative'}`;
                
                document.getElementById('high24h').innerText = `$${(coinData.usd_24h_high || currentPrice).toLocaleString()}`;
                document.getElementById('low24h').innerText = `$${(coinData.usd_24h_low || currentPrice).toLocaleString()}`;
                document.getElementById('volume24h').innerText = `$${(coinData.usd_24h_vol || 0).toLocaleString()}`;
                document.getElementById('marketCap').innerText = `$${(coinData.usd_market_cap || 0).toLocaleString()}`;
                
                updateTotal();
            }
        } catch (error) {
            console.error('Error fetching price:', error);
        }
    }
    
    // Generate candlestick data from price history
    async function fetchCandlestickData() {
        const coinId = coinGeckoIds[currentSymbol];
        if (!coinId) return [];
        
        try {
            const response = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=${currentTimeframe}`);
            const data = await response.json();
            
            const prices = data.prices;
            if (!prices || prices.length === 0) return [];
            
            // Create candlesticks
            const candles = [];
            const periodSeconds = currentTimeframe === '1' ? 3600 : 3600;
            
            for (let i = 0; i < prices.length; i++) {
                const time = Math.floor(prices[i][0] / 1000);
                const price = prices[i][1];
                
                if (candles.length === 0 || time - candles[candles.length - 1].time >= periodSeconds) {
                    candles.push({
                        time: time,
                        open: price,
                        high: price,
                        low: price,
                        close: price
                    });
                } else {
                    const lastCandle = candles[candles.length - 1];
                    lastCandle.high = Math.max(lastCandle.high, price);
                    lastCandle.low = Math.min(lastCandle.low, price);
                    lastCandle.close = price;
                }
            }
            
            return candles;
        } catch (error) {
            console.error('Error fetching candlestick data:', error);
            return generateMockCandles();
        }
    }
    
    // Generate mock candlestick data
    function generateMockCandles() {
        const candles = [];
        let basePrice = 77500;
        const now = Math.floor(Date.now() / 1000);
        const points = currentTimeframe === '1' ? 24 : currentTimeframe === '24' ? 48 : currentTimeframe === '7' ? 168 : 720;
        
        for (let i = points; i >= 0; i--) {
            const change = (Math.random() - 0.5) * 300;
            const open = basePrice;
            const close = basePrice + change;
            const high = Math.max(open, close) + Math.random() * 200;
            const low = Math.min(open, close) - Math.random() * 200;
            
            candles.push({
                time: now - (i * 3600),
                open: open,
                high: high,
                low: low,
                close: close
            });
            basePrice = close;
        }
        return candles;
    }
    
    // Format time label for x-axis
    function formatTimeLabel(time) {
        const date = new Date(time * 1000);
        const hours = date.getHours();
        const minutes = date.getMinutes();
        
        if (currentTimeframe === '1') {
            return `${hours}:${minutes.toString().padStart(2, '0')}`;
        } else if (currentTimeframe === '24') {
            return `${hours}:00`;
        } else {
            return `${date.getMonth() + 1}/${date.getDate()}`;
        }
    }
    
    // Initialize chart with candlesticks
    async function initChart() {
        const chartContainer = document.getElementById('chart-container');
        
        chart = LightweightCharts.createChart(chartContainer, {
            width: chartContainer.clientWidth,
            height: 500,
            layout: {
                backgroundColor: 'rgba(0, 0, 0, 0.2)',
                textColor: 'rgba(255, 255, 255, 0.8)',
            },
            grid: {
                vertLines: { color: 'rgba(255, 255, 255, 0.05)' },
                horzLines: { color: 'rgba(255, 255, 255, 0.05)' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
            rightPriceScale: {
                borderColor: 'rgba(255, 255, 255, 0.2)',
                scaleMargins: {
                    top: 0.1,
                    bottom: 0.1,
                },
            },
            timeScale: {
                borderColor: 'rgba(255, 255, 255, 0.2)',
                timeVisible: true,
                secondsVisible: false,
                tickMarkFormatter: (time) => {
                    const date = new Date(time * 1000);
                    const hours = date.getHours();
                    const minutes = date.getMinutes();
                    
                    if (currentTimeframe === '1') {
                        return `${hours}:${minutes.toString().padStart(2, '0')}`;
                    } else if (currentTimeframe === '24') {
                        return `${hours}:00`;
                    } else {
                        return `${date.getMonth() + 1}/${date.getDate()}`;
                    }
                },
            },
        });
        
        candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88',
            downColor: '#ff4444',
            borderDownColor: '#ff4444',
            borderUpColor: '#00ff88',
            wickDownColor: '#ff4444',
            wickUpColor: '#00ff88',
        });
        
        const candleData = await fetchCandlestickData();
        if (candleData.length > 0) {
            candleSeries.setData(candleData);
        }
        
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartContainer.clientWidth });
        });
    }
    
    // Update chart data
    async function updateChart() {
        if (candleSeries) {
            const candleData = await fetchCandlestickData();
            if (candleData.length > 0) {
                candleSeries.setData(candleData);
            }
        }
    }
    
    // Update total amount
    function updateTotal() {
        const amount = parseFloat(document.getElementById('tradeAmount').value) || 0;
        document.getElementById('totalAmount').innerText = `$${amount.toFixed(2)}`;
    }
    
    // Set trade type
    function setTradeType(type) {
        tradeType = type;
        const buyBtn = document.querySelector('.trade-type-btn.buy');
        const sellBtn = document.querySelector('.trade-type-btn.sell');
        const actionBtn = document.getElementById('tradeActionBtn');
        
        if (type === 'buy') {
            buyBtn.classList.add('active');
            sellBtn.classList.remove('active');
            actionBtn.className = 'trade-action-btn buy';
            actionBtn.innerText = 'BUY';
        } else {
            sellBtn.classList.add('active');
            buyBtn.classList.remove('active');
            actionBtn.className = 'trade-action-btn sell';
            actionBtn.innerText = 'SELL';
        }
    }
    
    // Execute trade
    function executeTrade() {
        const amount = parseFloat(document.getElementById('tradeAmount').value);
        if (!amount || amount <= 0) {
            alert('Please enter a valid amount');
            return;
        }
        
        alert(`${tradeType.toUpperCase()} order placed!\n\nAmount: ${amount} USDT\nPrice: $${currentPrice.toFixed(2)}\nTotal: $${amount.toFixed(2)}`);
        
        document.getElementById('tradeAmount').value = '';
        updateTotal();
    }
    
    // Timeframe change handler
    async function changeTimeframe(timeframe, btn) {
        currentTimeframe = timeframe;
        document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        await updateChart();
    }
    
    // Display username
    function displayUsername() {
        const savedUser = localStorage.getItem('lunoUser') || sessionStorage.getItem('lunoUser');
        if (savedUser) {
            try {
                const user = JSON.parse(savedUser);
                document.getElementById('displayUsername').innerText = user.fullName?.split(' ')[0] || user.email?.split('@')[0] || 'Trader';
            } catch(e) {}
        }
    }
    
    // Check authentication
    function checkAuth() {
        const savedUser = localStorage.getItem('lunoUser') || sessionStorage.getItem('lunoUser');
        if (!savedUser) {
            window.location.href = 'index.html';
        }
    }
    
    function logout() {
        localStorage.removeItem('lunoUser');
        sessionStorage.removeItem('lunoUser');
        window.location.href = 'index.html';
    }
    
    // Setup event listeners
    document.getElementById('tradeAmount').addEventListener('input', updateTotal);
    
    document.querySelectorAll('.tf-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            changeTimeframe(btn.getAttribute('data-timeframe'), btn);
        });
    });
    
    // Initialize
    checkAuth();
    displayUsername();
    getSelectedCoin();
    initChart();
    fetchRealTimePrice();
    updateCurrentTime();
    
    // Update price every 10 seconds
    setInterval(() => {
        fetchRealTimePrice();
    }, 10000);
    
    // Update chart every minute
    setInterval(() => {
        updateChart();
    }, 60000);
    
    // Update current time every second
    setInterval(() => {
        updateCurrentTime();
    }, 1000);
</script>

</body>
</html>
