<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            width: 450px;
        }
        h1 { color: white; margin-bottom: 20px; text-align: center; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }
        .error { color: #ff6666; margin-top: 10px; display: none; text-align: center; }
        a { color: #00d4ff; text-decoration: none; }
        p { text-align: center; margin-top: 20px; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔐 Login to Luno Trading</h1>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="errorMsg" class="error"></div>
    <p>Don't have an account? <a href="register.html">Sign Up</a></p>
</div>

<script type="module">
    import { auth, signInWithEmailAndPassword, db, doc, getDoc } from './firebase-config.js';
    
    window.login = async function() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        
        errorMsg.style.display = 'none';
        
        if (!email || !password) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = '❌ Please enter email and password';
            return;
        }
        
        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            window.location.href = 'dashboard.html';
        } catch (error) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = '❌ Invalid email or password';
        }
    }
</script>
</body>
</html>
