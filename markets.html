<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Markets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; color: white; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: fixed; top: 0; left: 0; width: 100%; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: bold; background: linear-gradient(135deg, #00d4ff, #7c3aed); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: white; text-decoration: none; transition: 0.3s; font-weight: 500; }
        .nav-links a:hover, .nav-links a.active { color: #00d4ff; }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .username { color: #00d4ff; }
        .logout-btn { background: rgba(255, 255, 255, 0.1); padding: 8px 20px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.2); text-decoration: none; color: white; cursor: pointer; transition: 0.3s; }
        .logout-btn:hover { background: rgba(255, 68, 68, 0.3); }
        .main-content { margin-top: 80px; padding: 30px 40px; max-width: 1400px; margin-left: auto; margin-right: auto; }
        .page-header { margin-bottom: 30px; }
        .page-header h1 { font-size: 2rem; font-weight: 600; margin-bottom: 10px; }
        .search-section { margin-bottom: 30px; }
        .search-input { width: 100%; padding: 14px 20px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; color: white; font-size: 1rem; }
        .category-filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); padding: 8px 16px; border-radius: 20px; cursor: pointer; color: white; transition: 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: linear-gradient(135deg, #00d4ff, #7c3aed); }
        .market-table { background: rgba(255, 255, 255, 0.05); border-radius: 20px; overflow: hidden; }
        .table-header { display: grid; grid-template-columns: 2fr 1.2fr 1.5fr 1.2fr 1fr; padding: 18px 24px; background: rgba(0, 0, 0, 0.3); font-weight: 600; color: rgba(255, 255, 255, 0.7); }
        .market-row { display: grid; grid-template-columns: 2fr 1.2fr 1.5fr 1.2fr 1fr; padding: 18px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: background 0.3s; cursor: pointer; }
        .market-row:hover { background: rgba(0, 212, 255, 0.1); }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #00d4ff, #7c3aed); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .coin-price { font-weight: 600; }
        .change-positive { color: #00ff88; font-weight: 600; }
        .change-negative { color: #ff4444; font-weight: 600; }
        .details-btn { background: rgba(0, 212, 255, 0.2); border: 1px solid rgba(0, 212, 255, 0.3); padding: 8px 20px; border-radius: 8px; cursor: pointer; color: #00d4ff; font-size: 0.85rem; width: fit-content; }
        .stats-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 20px; text-align: center; }
        .stat-number { font-size: 1.5rem; font-weight: bold; color: #00d4ff; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: linear-gradient(135deg, #1a1a3e, #0a0e27); padding: 25px; border-radius: 20px; width: 900px; max-width: 95%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .close-modal { font-size: 1.8rem; cursor: pointer; color: rgba(255, 255, 255, 0.6); }
        .price-info { margin-bottom: 20px; padding: 15px; background: rgba(0, 0, 0, 0.3); border-radius: 12px; }
        .current-price { font-size: 2rem; font-weight: bold; }
        .timeframe-buttons { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .timeframe-btn { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); padding: 6px 14px; border-radius: 20px; cursor: pointer; color: white; }
        .timeframe-btn.active { background: linear-gradient(135deg, #00d4ff, #7c3aed); }
        .chart-container { background: rgba(0, 0, 0, 0.3); border-radius: 12px; padding: 15px; margin-bottom: 20px; overflow-x: auto; }
        canvas { display: block; width: 100%; height: 400px; background: rgba(0, 0, 0, 0.2); border-radius: 8px; }
        .modal-buttons { display: flex; gap: 15px; margin-top: 20px; }
        .modal-buy { flex: 1; background: linear-gradient(135deg, #00ff88, #00cc6a); border: none; padding: 12px; border-radius: 10px; cursor: pointer; color: white; }
        .modal-sell { flex: 1; background: linear-gradient(135deg, #ff4444, #cc0000); border: none; padding: 12px; border-radius: 10px; cursor: pointer; color: white; }
        @media (max-width: 768px) { .table-header { display: none; } .market-row { grid-template-columns: 1fr; gap: 10px; } .stats-cards { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo">📈 Luno Trading</div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="markets.html" class="active">Markets</a>
        <a href="trade.html">Trades</a>
        <a href="profile.html">My Profile</a>
    </div>
    <div class="user-info">
        <span class="username" id="displayUsername">Trader</span>
        <a href="#" class="logout-btn" onclick="logout()">Logout</a>
    </div>
</nav>
<div class="main-content">
    <div class="page-header"><h1>Cryptocurrency Prices</h1><p>Track live cryptocurrency prices and market data</p></div>
    <div class="stats-cards">
        <div class="stat-card"><div class="stat-label">Total Market Cap</div><div class="stat-number" id="totalMarketCap">$3.12T</div></div>
        <div class="stat-card"><div class="stat-label">24h Volume</div><div class="stat-number" id="totalVolume">$98.5B</div></div>
        <div class="stat-card"><div class="stat-label">BTC Dominance</div><div class="stat-number" id="btcDominance">48.7%</div></div>
        <div class="stat-card"><div class="stat-label">Active Coins</div><div class="stat-number" id="activeCoins">24</div></div>
    </div>
    <div class="category-filters">
        <button class="filter-btn active" data-category="all">All Coins</button>
        <button class="filter-btn" data-category="large">Large Cap</button>
        <button class="filter-btn" data-category="mid">Mid Cap</button>
        <button class="filter-btn" data-category="defi">DeFi</button>
        <button class="filter-btn" data-category="meme">Meme Coins</button>
    </div>
    <div class="search-section"><input type="text" class="search-input" id="searchInput" placeholder="🔍 Search cryptocurrency..."></div>
    <div class="market-table"><div class="table-header"><div>Coin</div><div>Price</div><div>24h Change</div><div>Market Cap</div><div>Action</div></div><div id="marketList"></div></div>
</div>
<div id="coinModal" class="modal"><div class="modal-content"><div class="modal-header"><h2 id="modalCoinName">Bitcoin (BTC)</h2><span class="close-modal" onclick="closeModal()">&times;</span></div><div class="price-info"><div><span class="current-price" id="modalPrice">$0</span></div></div><div class="timeframe-buttons"><button class="timeframe-btn" onclick="changeTimeframe('1D')">1D</button><button class="timeframe-btn" onclick="changeTimeframe('7D')">7D</button><button class="timeframe-btn active" onclick="changeTimeframe('1M')">1M</button><button class="timeframe-btn" onclick="changeTimeframe('3M')">3M</button><button class="timeframe-btn" onclick="changeTimeframe('1Y')">1Y</button></div><div class="chart-container"><canvas id="priceChart" width="800" height="400"></canvas></div><div class="modal-buttons"><button class="modal-buy" onclick="quickTrade('buy')">Buy</button><button class="modal-sell" onclick="quickTrade('sell')">Sell</button></div></div></div>
<script>
    function getCurrentUser() { const session = localStorage.getItem('lunoSession') || sessionStorage.getItem('lunoSession'); if (session) { try { return JSON.parse(session); } catch(e) {} } return null; }
    function checkAuth() { const user = getCurrentUser(); if (!user) { window.location.href = 'index.html'; } return user; }
    function logout() { localStorage.removeItem('lunoSession'); sessionStorage.removeItem('lunoSession'); window.location.href = 'index.html'; }
    checkAuth(); const user = getCurrentUser(); document.getElementById('displayUsername').innerText = user?.fullName?.split(' ')[0] || 'Trader';
    
    const cryptocurrencies = [
        { symbol: 'BTC', name: 'Bitcoin', price: 75678.36, marketCap: 1519025675788, change24h: -2.33, category: 'large' },
        { symbol: 'ETH', name: 'Ethereum', price: 2363.69, marketCap: 285249946479, change24h: 1.8, category: 'large' },
        { symbol: 'USDT', name: 'Tether', price: 1.00, marketCap: 186639389287, change24h: 0.05, category: 'large' },
        { symbol: 'BNB', name: 'Binance Coin', price: 580.50, marketCap: 88500000000, change24h: 0.8, category: 'large' },
        { symbol: 'XRP', name: 'XRP', price: 1.43, marketCap: 88256758366, change24h: -1.2, category: 'large' },
        { symbol: 'SOL', name: 'Solana', price: 142.30, marketCap: 63200000000, change24h: 3.2, category: 'large' },
        { symbol: 'ADA', name: 'Cardano', price: 0.348, marketCap: 12400000000, change24h: -0.5, category: 'large' },
        { symbol: 'AVAX', name: 'Avalanche', price: 28.45, marketCap: 11200000000, change24h: 1.2, category: 'large' },
        { symbol: 'DOGE', name: 'Dogecoin', price: 0.158, marketCap: 22800000000, change24h: 1.5, category: 'meme' },
        { symbol: 'DOT', name: 'Polkadot', price: 6.85, marketCap: 9800000000, change24h: -0.8, category: 'mid' },
        { symbol: 'LINK', name: 'Chainlink', price: 14.20, marketCap: 8500000000, change24h: 2.1, category: 'mid' },
        { symbol: 'MATIC', name: 'Polygon', price: 0.52, marketCap: 5200000000, change24h: 0.3, category: 'mid' },
        { symbol: 'UNI', name: 'Uniswap', price: 7.85, marketCap: 5900000000, change24h: 1.8, category: 'defi' },
        { symbol: 'AAVE', name: 'Aave', price: 92.50, marketCap: 1380000000, change24h: 2.5, category: 'defi' },
        { symbol: 'SHIB', name: 'Shiba Inu', price: 0.000018, marketCap: 10600000000, change24h: 5.2, category: 'meme' },
        { symbol: 'PEPE', name: 'Pepe', price: 0.0000095, marketCap: 4000000000, change24h: 8.5, category: 'meme' }
    ];
    let currentCategory = 'all', currentSearch = '', currentCoin = null, currentTimeframe = '1M', chart = null;
    function formatPrice(p, s) { if (p < 0.01) return `$${p.toExponential(4)}`; if (p < 1) return `$${p.toFixed(4)}`; return `$${p.toLocaleString()}`; }
    function formatMarketCap(c) { if (c >= 1e12) return `$${(c/1e12).toFixed(2)}T`; if (c >= 1e9) return `$${(c/1e9).toFixed(2)}B`; return `$${(c/1e6).toFixed(2)}M`; }
    function renderMarketList() {
        let filtered = cryptocurrencies.filter(c => currentCategory === 'all' || c.category === currentCategory);
        if (currentSearch) filtered = filtered.filter(c => c.name.toLowerCase().includes(currentSearch.toLowerCase()) || c.symbol.toLowerCase().includes(currentSearch.toLowerCase()));
        document.getElementById('marketList').innerHTML = filtered.map(coin => `<div class="market-row"><div class="coin-info"><div class="coin-icon">${coin.symbol[0]}</div><div><div class="coin-name">${coin.name}</div><div class="coin-symbol">${coin.symbol}</div></div></div><div class="coin-price">${formatPrice(coin.price, coin.symbol)}</div><div class="${coin.change24h >= 0 ? 'change-positive' : 'change-negative'}">${coin.change24h >= 0 ? '+' : ''}${coin.change24h}%</div><div class="market-cap">${formatMarketCap(coin.marketCap)}</div><div><button class="details-btn" onclick="showCoinDetails('${coin.symbol}')">Details</button></div></div>`).join('');
    }
    function generateChartData(coin, tf) { let points = []; let count = tf === '1D' ? 24 : tf === '7D' ? 7 : tf === '1M' ? 30 : tf === '3M' ? 90 : 365; let base = coin.price; for (let i = 0; i < count; i++) { let change = (Math.random() - 0.5) * base * 0.03; points.push(base + change * (i/count)); } return points; }
    function drawChart() { if (!currentCoin) return; const canvas = document.getElementById('priceChart'); if (!canvas) return; const ctx = canvas.getContext('2d'); const data = generateChartData(currentCoin, currentTimeframe); canvas.width = canvas.clientWidth; canvas.height = 400; const w = canvas.width, h = canvas.height, pad = 40, cw = w - pad*2, ch = h - pad*2; const maxP = Math.max(...data), minP = Math.min(...data), range = maxP - minP; ctx.clearRect(0,0,w,h); ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,w,h); ctx.strokeStyle = 'rgba(255,255,255,0.1)'; for(let i=0;i<=4;i++){ let y = pad + (ch/4)*i; ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(w-pad,y); ctx.stroke(); ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '10px Arial'; ctx.fillText(`$${(maxP - (range/4)*i).toFixed(0)}`, 5, y+3); } ctx.beginPath(); ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 2; let step = cw / (data.length-1); for(let i=0;i<data.length;i++){ let x = pad + i*step; let y = pad + ch - ((data[i]-minP)/range)*ch; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); } ctx.stroke(); for(let i=0;i<data.length;i+=Math.max(1,Math.floor(data.length/6))){ let x = pad + i*step; let y = pad + ch - ((data[i]-minP)/range)*ch; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fillStyle = '#00d4ff'; ctx.fill(); } }
    function changeTimeframe(tf) { currentTimeframe = tf; document.querySelectorAll('.timeframe-btn').forEach(btn => btn.classList.remove('active')); event.target.classList.add('active'); drawChart(); }
    function showCoinDetails(symbol) { currentCoin = cryptocurrencies.find(c => c.symbol === symbol); document.getElementById('modalCoinName').innerText = `${currentCoin.name} (${currentCoin.symbol})`; document.getElementById('modalPrice').innerText = formatPrice(currentCoin.price, currentCoin.symbol); drawChart(); document.getElementById('coinModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('coinModal').style.display = 'none'; currentCoin = null; }
    function quickTrade(action) { if(currentCoin){ localStorage.setItem('selectedCrypto', JSON.stringify({symbol:currentCoin.symbol, name:currentCoin.name, price:currentCoin.price})); window.location.href = 'trade.html'; } }
    document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentCategory = btn.dataset.category; renderMarketList(); }));
    document.getElementById('searchInput').addEventListener('input', (e) => { currentSearch = e.target.value; renderMarketList(); });
    window.onclick = function(e) { if(e.target === document.getElementById('coinModal')) closeModal(); }
    renderMarketList();
</script>
</body>
</html>
