<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno Trading - Professional Trading View</title>
    <!-- Lightweight Charts Library -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #131722 !important;
            color: #d1d4dc !important;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: #1e222d !important;
            border-bottom: 1px solid #2a2e39 !important;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #d1d4dc !important;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #00d4ff !important;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username {
            color: #00d4ff !important;
            font-size: 0.85rem;
        }

        .logout-btn {
            background: rgba(255, 68, 68, 0.15);
            padding: 5px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444 !important;
        }

        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.3);
        }

        /* Main Layout */
        .trading-container {
            margin-top: 50px;
            display: flex;
            height: calc(100vh - 50px);
            background: #131722 !important;
        }

        /* Left Panel - Chart Area */
        .chart-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            background: #131722 !important;
            border-right: 1px solid #2a2e39;
        }

        /* Chart Header */
        .chart-header {
            padding: 12px 16px;
            background: #1e222d !important;
            border-bottom: 1px solid #2a2e39;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .symbol-info {
            display: flex;
            align-items: baseline;
            gap: 15px;
            flex-wrap: wrap;
        }

        .symbol {
            font-size: 1.5rem;
            font-weight: 600;
            color: white !important;
        }

        .price {
            font-size: 1.8rem;
            font-weight: 600;
            color: #00ff88 !important;
        }

        .change {
            font-size: 0.9rem;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .change.positive {
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88 !important;
        }

        .change.negative {
            background: rgba(255, 68, 68, 0.15);
            color: #ff4444 !important;
        }

        /* Timeframes */
        .timeframes {
            display: flex;
            gap: 3px;
            background: #2a2e39;
            padding: 3px;
            border-radius: 8px;
        }

        .tf-btn {
            background: transparent;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            color: #d1d4dc !important;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: 0.2s;
        }

        .tf-btn:hover, .tf-btn.active {
            background: #00d4ff;
            color: #131722 !important;
        }

        /* Chart Container */
        #chart-container {
            flex: 1;
            width: 100%;
            background: #131722 !important;
        }

        /* Order Book Panel */
        .orderbook-panel {
            width: 320px;
            background: #1e222d !important;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2e39;
        }

        .panel-title {
            padding: 12px 16px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #d1d4dc !important;
            border-bottom: 1px solid #2a2e39;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .orderbook-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 10px 12px;
            font-size: 0.7rem;
            color: #787b86 !important;
            border-bottom: 1px solid #2a2e39;
        }

        .orderbook-asks {
            flex: 1;
            max-height: 40%;
            overflow-y: auto;
        }

        .orderbook-bids {
            flex: 1;
            max-height: 40%;
            overflow-y: auto;
        }

        .orderbook-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-family: monospace;
        }

        .orderbook-row.ask {
            color: #ff4444 !important;
        }

        .orderbook-row.bid {
            color: #00ff88 !important;
        }

        .spread {
            text-align: center;
            padding: 8px;
            font-size: 0.7rem;
            color: #787b86 !important;
            border-top: 1px solid #2a2e39;
            border-bottom: 1px solid #2a2e39;
        }

        /* Right Panel - Trade & Stats */
        .trade-panel {
            width: 300px;
            background: #1e222d !important;
            display: flex;
            flex-direction: column;
        }

        /* Market Stats */
        .stats-section {
            padding: 12px 16px;
            border-bottom: 1px solid #2a2e39;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.75rem;
        }

        .stat-label {
            color: #787b86 !important;
        }

        .stat-value {
            font-weight: 500;
            color: #d1d4dc !important;
        }

        /* Trade Form */
        .trade-section {
            padding: 16px;
        }

        .trade-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .trade-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .trade-tab.buy {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88 !important;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .trade-tab.sell {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444 !important;
            border: 1px solid rgba(255, 68, 68, 0.2);
        }

        .trade-tab.active {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white !important;
            border: none;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-label {
            font-size: 0.7rem;
            color: #787b86 !important;
            margin-bottom: 4px;
            display: block;
        }

        .trade-input {
            width: 100%;
            padding: 10px;
            background: #2a2e39 !important;
            border: 1px solid #3a3e49;
            border-radius: 6px;
            color: white !important;
            font-size: 0.85rem;
        }

        .trade-input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .trade-input::placeholder {
            color: #787b86;
        }

        .percentage-buttons {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .perc-btn {
            flex: 1;
            padding: 5px;
            background: #2a2e39;
            border: none;
            border-radius: 4px;
            color: #d1d4dc !important;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .perc-btn:hover {
            background: #00d4ff;
            color: #131722 !important;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            margin-top: 8px;
            border-top: 1px solid #2a2e39;
        }

        .trade-action-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            font-size: 0.9rem;
        }

        .trade-action-btn.buy {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: white !important;
        }

        .trade-action-btn.sell {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white !important;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #2a2e39;
        }

        ::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 4px;
        }

        @media (max-width: 1100px) {
            .orderbook-panel {
                display: none;
            }
        }

        @media (max-width: 800px) {
            .trade-panel {
                width: 260px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">📈 Luno Trading</div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="markets.html">Markets</a>
        <a href="trade.html">Trades</a>
        <a href="profile.html">Profile</a>
    </div>
    <div class="user-info">
        <span class="username" id="displayUsername">Trader</span>
        <a href="#" class="logout-btn" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="trading-container">
    <!-- Left Chart Panel -->
    <div class="chart-panel">
        <div class="chart-header">
            <div class="symbol-info">
                <span class="symbol" id="coinSymbol">BTC/USDT</span>
                <span class="price" id="currentPrice">$0.00</span>
                <span class="change" id="priceChange">0.00%</span>
            </div>
            <div class="timeframes">
                <button class="tf-btn" data-timeframe="1">1m</button>
                <button class="tf-btn" data-timeframe="5">5m</button>
                <button class="tf-btn" data-timeframe="15">15m</button>
                <button class="tf-btn active" data-timeframe="60">1h</button>
                <button class="tf-btn" data-timeframe="240">4h</button>
                <button class="tf-btn" data-timeframe="1440">1d</button>
                <button class="tf-btn" data-timeframe="10080">1w</button>
            </div>
        </div>
        <div id="chart-container"></div>
    </div>

    <!-- Order Book Panel -->
    <div class="orderbook-panel">
        <div class="panel-title">ORDER BOOK</div>
        <div class="orderbook-header">
            <span>Price (USDT)</span>
            <span>Amount</span>
            <span>Total</span>
        </div>
        <div class="orderbook-asks" id="orderbookAsks"></div>
        <div class="spread" id="spreadDisplay">Spread: 0.00 (0.00%)</div>
        <div class="orderbook-bids" id="orderbookBids"></div>
    </div>

    <!-- Right Trade Panel -->
    <div class="trade-panel">
        <div class="stats-section">
            <div class="stat-row">
                <span class="stat-label">24h High</span>
                <span class="stat-value" id="high24h">$0.00</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">24h Low</span>
                <span class="stat-value" id="low24h">$0.00</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">24h Volume</span>
                <span class="stat-value" id="volume24h">$0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Market Cap</span>
                <span class="stat-value" id="marketCap">$0</span>
            </div>
        </div>

        <div class="trade-section">
            <div class="trade-tabs">
                <div class="trade-tab buy active" onclick="setTradeType('buy')">BUY</div>
                <div class="trade-tab sell" onclick="setTradeType('sell')">SELL</div>
            </div>
            
            <div class="input-group">
                <label class="input-label">Amount (USDT)</label>
                <input type="number" id="tradeAmount" class="trade-input" placeholder="0.00" oninput="updateTotal()">
                <div class="percentage-buttons">
                    <button class="perc-btn" onclick="setPercentage(25)">25%</button>
                    <button class="perc-btn" onclick="setPercentage(50)">50%</button>
                    <button class="perc-btn" onclick="setPercentage(75)">75%</button>
                    <button class="perc-btn" onclick="setPercentage(100)">100%</button>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Price (USDT)</label>
                <input type="text" id="tradePrice" class="trade-input" readonly>
            </div>

            <div class="total-row">
                <span class="stat-label">Total</span>
                <span class="stat-value" id="totalAmount">$0.00</span>
            </div>

            <button class="trade-action-btn buy" id="tradeActionBtn" onclick="executeTrade()">BUY</button>
        </div>
    </div>
</div>

<script>
    let chart = null;
    let candleSeries = null;
    let currentSymbol = 'BTC';
    let currentTimeframe = '60';
    let tradeType = 'buy';
    let currentPrice = 0;
    let userBalance = 0;
    
    // CoinGecko API mapping
    const coinGeckoIds = {
        'BTC': 'bitcoin',
        'ETH': 'ethereum',
        'SOL': 'solana',
        'DOGE': 'dogecoin',
        'BNB': 'binancecoin',
        'XRP': 'ripple',
        'ADA': 'cardano',
        'AVAX': 'avalanche-2'
    };
    
    // Get selected coin
    function getSelectedCoin() {
        const params = new URLSearchParams(window.location.search);
        const symbol = params.get('symbol');
        if (symbol && coinGeckoIds[symbol]) {
            currentSymbol = symbol;
        } else {
            const saved = localStorage.getItem('selectedCrypto');
            if (saved) {
                try {
                    const crypto = JSON.parse(saved);
                    currentSymbol = crypto.symbol;
                } catch(e) {}
            }
        }
        document.getElementById('coinSymbol').innerText = `${currentSymbol}/USDT`;
    }
    
    // Fetch real-time price
    async function fetchRealTimePrice() {
        const coinId = coinGeckoIds[currentSymbol];
        if (!coinId) return;
        
        try {
            const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coinId}&vs_currencies=usd&include_24hr_change=true&include_24hr_high_low=true&include_24hr_vol=true&include_market_cap=true`);
            const data = await response.json();
            const coinData = data[coinId];
            
            if (coinData) {
                currentPrice = coinData.usd;
                document.getElementById('currentPrice').innerText = `$${currentPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                
                const change = coinData.usd_24h_change || 0;
                const changeElement = document.getElementById('priceChange');
                changeElement.innerText = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                changeElement.className = `change ${change >= 0 ? 'positive' : 'negative'}`;
                
                document.getElementById('high24h').innerText = `$${(coinData.usd_24h_high || currentPrice).toLocaleString()}`;
                document.getElementById('low24h').innerText = `$${(coinData.usd_24h_low || currentPrice).toLocaleString()}`;
                document.getElementById('volume24h').innerText = `$${(coinData.usd_24h_vol || 0).toLocaleString()}`;
                document.getElementById('marketCap').innerText = `$${(coinData.usd_market_cap || 0).toLocaleString()}`;
                
                updateOrderBook(currentPrice);
                document.getElementById('tradePrice').value = currentPrice.toFixed(2);
                updateTotal();
            }
        } catch (error) {
            console.error('Error fetching price:', error);
        }
    }
    
    // Update order book
    function updateOrderBook(price) {
        const spread = price * 0.001;
        const bidPrice = price - spread;
        const askPrice = price + spread;
        
        document.getElementById('spreadDisplay').innerHTML = `Spread: $${spread.toFixed(2)} (${(spread/price*100).toFixed(3)}%)`;
        
        const asksContainer = document.getElementById('orderbookAsks');
        const bidsContainer = document.getElementById('orderbookBids');
        
        let asksHtml = '';
        let bidsHtml = '';
        
        for (let i = 1; i <= 10; i++) {
            const ask = askPrice + (i * (spread));
            const amount = (Math.random() * 0.8 + 0.2).toFixed(4);
            const total = (ask * amount).toFixed(0);
            asksHtml += `<div class="orderbook-row ask"><span>${ask.toFixed(2)}</span><span>${amount}</span><span>${parseInt(total).toLocaleString()}</span></div>`;
        }
        
        for (let i = 1; i <= 10; i++) {
            const bid = bidPrice - (i * (spread));
            const amount = (Math.random() * 0.8 + 0.2).toFixed(4);
            const total = (bid * amount).toFixed(0);
            bidsHtml += `<div class="orderbook-row bid"><span>${bid.toFixed(2)}</span><span>${amount}</span><span>${parseInt(total).toLocaleString()}</span></div>`;
        }
        
        asksContainer.innerHTML = asksHtml;
        bidsContainer.innerHTML = bidsHtml;
    }
    
    // Fetch candlestick data
    async function fetchCandlestickData() {
        const coinId = coinGeckoIds[currentSymbol];
        if (!coinId) return [];
        
        const days = currentTimeframe === '1' ? 1 : currentTimeframe === '5' ? 1 : 
                     currentTimeframe === '15' ? 1 : currentTimeframe === '60' ? 7 : 
                     currentTimeframe === '240' ? 30 : currentTimeframe === '1440' ? 90 : 365;
        
        try {
            const response = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=${days}`);
            const data = await response.json();
            const prices = data.prices;
            if (!prices || prices.length === 0) return [];
            
            const candles = [];
            let currentCandle = null;
            let candleMinutes = parseInt(currentTimeframe);
            
            for (let i = 0; i < prices.length; i++) {
                const time = Math.floor(prices[i][0] / 1000);
                const price = prices[i][1];
                
                if (!currentCandle) {
                    currentCandle = {
                        time: time,
                        open: price,
                        high: price,
                        low: price,
                        close: price
                    };
                } else if (time - currentCandle.time >= candleMinutes * 60) {
                    candles.push(currentCandle);
                    currentCandle = {
                        time: time,
                        open: price,
                        high: price,
                        low: price,
                        close: price
                    };
                } else {
                    currentCandle.high = Math.max(currentCandle.high, price);
                    currentCandle.low = Math.min(currentCandle.low, price);
                    currentCandle.close = price;
                }
            }
            if (currentCandle) candles.push(currentCandle);
            return candles;
        } catch (error) {
            console.error('Error fetching data:', error);
            return [];
        }
    }
    
    // Initialize chart
    async function initChart() {
        const container = document.getElementById('chart-container');
        
        chart = LightweightCharts.createChart(container, {
            width: container.clientWidth,
            height: container.clientHeight,
            layout: {
                backgroundColor: '#131722',
                textColor: '#d1d4dc',
            },
            grid: {
                vertLines: { color: '#2a2e39' },
                horzLines: { color: '#2a2e39' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
            rightPriceScale: {
                borderColor: '#2a2e39',
            },
            timeScale: {
                borderColor: '#2a2e39',
                timeVisible: true,
                secondsVisible: false,
            },
        });
        
        candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88',
            downColor: '#ff4444',
            borderDownColor: '#ff4444',
            borderUpColor: '#00ff88',
            wickDownColor: '#ff4444',
            wickUpColor: '#00ff88',
        });
        
        const data = await fetchCandlestickData();
        if (data.length > 0) candleSeries.setData(data);
        
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
        });
    }
    
    async function updateChart() {
        if (candleSeries) {
            const data = await fetchCandlestickData();
            if (data.length > 0) candleSeries.setData(data);
        }
    }
    
    // Trade functions
    function setTradeType(type) {
        tradeType = type;
        const buyTab = document.querySelector('.trade-tab.buy');
        const sellTab = document.querySelector('.trade-tab.sell');
        const actionBtn = document.getElementById('tradeActionBtn');
        
        if (type === 'buy') {
            buyTab.classList.add('active');
            sellTab.classList.remove('active');
            actionBtn.className = 'trade-action-btn buy';
            actionBtn.innerText = 'BUY';
        } else {
            sellTab.classList.add('active');
            buyTab.classList.remove('active');
            actionBtn.className = 'trade-action-btn sell';
            actionBtn.innerText = 'SELL';
        }
    }
    
    function setPercentage(percent) {
        const maxAmount = userBalance;
        const amount = (maxAmount * percent / 100).toFixed(2);
        document.getElementById('tradeAmount').value = amount;
        updateTotal();
    }
    
    function updateTotal() {
        const amount = parseFloat(document.getElementById('tradeAmount').value) || 0;
        document.getElementById('totalAmount').innerText = `$${amount.toFixed(2)}`;
    }
    
    function updateBalance() {
        const profile = JSON.parse(localStorage.getItem('lunoProfile') || '{"balance": 0}');
        userBalance = profile.balance;
    }
    
    function executeTrade() {
        const amount = parseFloat(document.getElementById('tradeAmount').value);
        if (!amount || amount <= 0) {
            alert('Please enter a valid amount');
            return;
        }
        
        if (amount > userBalance && tradeType === 'buy') {
            alert(`Insufficient balance! You have $${userBalance.toFixed(2)} USDT`);
            return;
        }
        
        alert(`${tradeType.toUpperCase()} order placed!\n\nAmount: ${amount} USDT\nPrice: $${currentPrice.toFixed(2)}\nTotal: $${amount.toFixed(2)}`);
        
        if (tradeType === 'buy') {
            userBalance -= amount;
            const profile = JSON.parse(localStorage.getItem('lunoProfile') || '{"balance": 0}');
            profile.balance = userBalance;
            localStorage.setItem('lunoProfile', JSON.stringify(profile));
        }
        
        document.getElementById('tradeAmount').value = '';
        updateTotal();
    }
    
    // Auth functions
    function displayUsername() {
        const savedUser = localStorage.getItem('lunoUser') || sessionStorage.getItem('lunoUser');
        if (savedUser) {
            try {
                const user = JSON.parse(savedUser);
                document.getElementById('displayUsername').innerText = user.fullName?.split(' ')[0] || user.email?.split('@')[0] || 'Trader';
            } catch(e) {}
        }
    }
    
    function checkAuth() {
        const savedUser = localStorage.getItem('lunoUser') || sessionStorage.getItem('lunoUser');
        if (!savedUser) window.location.href = 'index.html';
    }
    
    function logout() {
        localStorage.removeItem('lunoUser');
        sessionStorage.removeItem('lunoUser');
        window.location.href = 'index.html';
    }
    
    // Timeframe change
    document.querySelectorAll('.tf-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTimeframe = btn.getAttribute('data-timeframe');
            await updateChart();
        });
    });
    
    document.getElementById('tradeAmount').addEventListener('input', updateTotal);
    
    // Initialize
    checkAuth();
    displayUsername();
    getSelectedCoin();
    updateBalance();
    initChart();
    fetchRealTimePrice();
    
    setInterval(() => fetchRealTimePrice(), 10000);
    setInterval(() => updateChart(), 60000);
</script>

</body>
</html>
